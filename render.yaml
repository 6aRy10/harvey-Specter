services:
  - type: web
    name: lexagents-api
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: SLACK_WEBHOOK_LEGAL
        sync: false
      - key: SLACK_WEBHOOK_EXECUTIVE
        sync: false
      - key: FRONTEND_URL
        value: https://lexagents.netlify.app
    disk:
      name: vector-store
      mountPath: /opt/render/project/src/data
      sizeGB: 1
