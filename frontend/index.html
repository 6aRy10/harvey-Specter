<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harveyy — Autonomous AI Law Firm</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#000;color:#fff;overflow-x:hidden}
*::-webkit-scrollbar{width:5px}
*::-webkit-scrollbar-track{background:#111}
*::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
.font-serif{font-family:'Playfair Display',serif}
.font-harvey{font-family:'DM Serif Display',serif;font-weight:400}
/* Premium light dashboard theme */
.dash-light{background:#fafaf9;color:#1a1a1a}
.dash-light .card{background:#fff;border:1px solid #e8e5e0;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.dash-light .card-header{font-family:'DM Serif Display',serif;font-weight:400;color:#1a1a1a}
.dash-light input,.dash-light textarea{background:#fafaf9;border:1px solid #ddd8d0;color:#1a1a1a;font-family:'Inter',sans-serif}
.dash-light input:focus,.dash-light textarea:focus{border-color:#999;outline:none}
.dash-light .btn-primary{background:#1a1a1a;color:#fff;border:none;font-family:'DM Serif Display',serif;font-weight:400}
.dash-light .btn-primary:hover{background:#333}
.dash-light .btn-primary:disabled{background:#ccc;color:#999}
.dash-light .btn-outline{background:transparent;border:1px solid #ddd8d0;color:#666}
.dash-light .btn-outline:hover{border-color:#999;color:#1a1a1a}
.badge-disputed{background:#ffe0e0;color:#c53030;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:500}
.badge-somewhat{background:#fefcbf;color:#975a16;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:500}
.badge-clear{background:#c6f6d5;color:#276749;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:500}
.table-premium{width:100%;border-collapse:separate;border-spacing:0}
.table-premium th{text-align:left;padding:12px 16px;font-size:13px;color:#888;font-weight:500;border-bottom:1px solid #eee}
.table-premium td{padding:14px 16px;border-bottom:1px solid #f5f3f0;font-size:14px;color:#333;vertical-align:middle}
.table-premium tr:hover td{background:#faf9f7}
.highlight-high{background:rgba(239,68,68,.25);border-bottom:2px solid #ef4444;padding:1px 2px;border-radius:2px;cursor:pointer}
.highlight-medium{background:rgba(245,158,11,.2);border-bottom:2px solid #f59e0b;padding:1px 2px;border-radius:2px;cursor:pointer}
.highlight-low{background:rgba(59,130,246,.15);border-bottom:2px solid #3b82f6;padding:1px 2px;border-radius:2px;cursor:pointer}
@keyframes fade-up{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
.fade-up{animation:fade-up .8s ease both}
.fade-up-d1{animation:fade-up .8s .15s ease both}
.fade-up-d2{animation:fade-up .8s .3s ease both}
.fade-up-d3{animation:fade-up .8s .45s ease both}
.fade-in{animation:fade-in .6s ease both}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
.agent-active{animation:pulse-dot 1.2s infinite}
@keyframes slide-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.slide-in{animation:slide-in .3s ease both}
.hero-gradient{background:linear-gradient(90deg,rgba(0,0,0,.85) 0%,rgba(0,0,0,.6) 40%,rgba(0,0,0,.2) 70%,transparent 100%)}
@keyframes hero-bg{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes smoke{0%,100%{opacity:.3;transform:scale(1) translateY(0)}50%{opacity:.15;transform:scale(1.1) translateY(-20px)}}
.hero-cinematic{background:linear-gradient(-45deg,#0a0a0f,#1a0a1e,#0f1a2e,#0a0f1a,#1a0f0a,#0a0a0f);background-size:600% 600%;animation:hero-bg 20s ease infinite}
.smoke-layer{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(100,80,60,.15) 0%,transparent 70%);animation:smoke 8s ease infinite}
.smoke-layer-2{position:absolute;inset:0;background:radial-gradient(ellipse at 70% 60%,rgba(60,50,80,.12) 0%,transparent 60%);animation:smoke 12s ease infinite reverse}
@keyframes scrollUp{0%{transform:translateY(0)}100%{transform:translateY(-50%)}}
.use-case-scroll{animation:scrollUp 14s linear infinite}
.use-case-scroll:hover{animation-play-state:paused}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const API=(window.location.hostname==="localhost"||window.location.hostname==="127.0.0.1")?"http://localhost:8000":"https://harvey-specter.onrender.com";
const{useState,useEffect,useRef,useCallback}=React;

/* ───────────── LANDING PAGE ───────────── */
function LandingPage({onEnter}){
  const vidRef=useRef();
  const audioRef=useRef();
  const[muted,setMuted]=useState(true);
  useEffect(()=>{const v=vidRef.current;if(!v)return;v.muted=true;v.volume=0;v.play().catch(()=>{});const resume=()=>{v.muted=true;v.play().catch(()=>{})};document.addEventListener('click',resume,{once:true});document.addEventListener('touchstart',resume,{once:true});return()=>{document.removeEventListener('click',resume);document.removeEventListener('touchstart',resume);};},[]);
  const toggleAudio=()=>{const a=audioRef.current;if(!a)return;if(muted){a.volume=0.3;a.play().catch(()=>{});setMuted(false);}else{a.pause();setMuted(true);}};
  const scrollTo=(id)=>document.getElementById(id)?.scrollIntoView({behavior:'smooth'});
  const navItems=[
    {label:'Contract Review',id:'contract-review'},
    {label:'Legal Research',id:'legal-research'},
    {label:'Compliance',id:'compliance'},
    {label:'Agents',id:'agents'},
    {label:'Security',id:'security'},
  ];
  return(
    <div className="bg-black text-white">
      {/* ── Fixed Glass Nav ── */}
      <nav className="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-8 md:px-16 py-5"
        style={{background:'rgba(0,0,0,0.55)',backdropFilter:'blur(16px)',borderBottom:'1px solid rgba(255,255,255,0.07)'}}>
        <span className="text-2xl cursor-pointer" style={{fontFamily:"'DM Serif Display', serif"}} onClick={()=>window.scrollTo({top:0,behavior:'smooth'})}>Harveyy</span>
        <div className="hidden md:flex items-center gap-8 text-sm text-gray-300">
          {navItems.map(n=>(
            <span key={n.id} onClick={()=>scrollTo(n.id)}
              className="hover:text-white cursor-pointer transition relative group">
              {n.label}
              <span className="absolute -bottom-0.5 left-0 w-0 h-px bg-white/60 transition-all duration-300 group-hover:w-full"/>
            </span>
          ))}
        </div>
        <div className="flex items-center gap-3">
          <button onClick={toggleAudio} title={muted?"Play ambient audio":"Mute audio"}
            className="flex items-center justify-center w-8 h-8 rounded-lg text-gray-400 hover:text-white transition"
            style={{background:'rgba(255,255,255,0.07)',backdropFilter:'blur(8px)',border:'1px solid rgba(255,255,255,0.12)'}}>
            {muted
              ? <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
              : <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>}
          </button>
          <button onClick={onEnter}
            className="px-4 py-1.5 rounded text-xs font-medium text-gray-300 hover:text-white transition"
            style={{background:'rgba(255,255,255,0.07)',border:'1px solid rgba(255,255,255,0.15)'}}>
            Launch Platform
          </button>
        </div>
      </nav>

      {/* ── Hero Section ── */}
      <div className="relative overflow-hidden" style={{height:'100vh'}}>
        <div className="hero-cinematic absolute inset-0" style={{zIndex:0}}/>
        <div className="smoke-layer" style={{zIndex:1}}/>
        <div className="smoke-layer-2" style={{zIndex:1}}/>
        <video ref={vidRef} autoPlay muted loop playsInline preload="auto"
          className="absolute inset-0 w-full h-full object-cover"
          style={{zIndex:2,filter:'brightness(0.45)',opacity:1}}>
          <source src="hero.mp4" type="video/mp4"/>
        </video>
        <div className="absolute inset-0" style={{zIndex:3,background:'linear-gradient(90deg,rgba(0,0,0,.82) 0%,rgba(0,0,0,.55) 45%,rgba(0,0,0,.15) 75%,transparent 100%)'}}/>
        <div className="absolute inset-0" style={{zIndex:3,background:'linear-gradient(to top,rgba(0,0,0,.9) 0%,transparent 40%,transparent 80%,rgba(0,0,0,.4) 100%)'}}/>
        <audio ref={audioRef} loop style={{display:'none'}}><source src="bg-audio.mp3" type="audio/mpeg"/></audio>
        <div className="relative z-20 flex flex-col justify-center px-8 md:px-16 h-full max-w-3xl pt-20">
          <div className="mb-4">
            <span className="text-xs uppercase tracking-[.2em] text-gray-400">Harveyy Agents execute legal work end-to-end</span>
          </div>
          <h1 className="font-serif text-5xl md:text-7xl lg:text-8xl font-medium leading-[1.05] tracking-tight fade-up" style={{fontStyle:'italic'}}>
            This is Harveyy.<br/>Your best closer.
          </h1>
          <p className="mt-6 text-base md:text-lg text-gray-300 max-w-lg leading-relaxed fade-up-d1">
            For German excellency: Preserve institutional knowledge. Automate the routine. Escalate the critical.
          </p>
          <div className="mt-10 flex items-center gap-4 fade-up-d2">
            <button onClick={onEnter}
              className="px-7 py-3.5 border border-white/80 rounded text-sm font-medium hover:bg-white hover:text-black transition-all duration-300">
              Request a Demo
            </button>
            <button onClick={()=>scrollTo('contract-review')}
              className="flex items-center gap-2 text-sm text-gray-400 hover:text-white transition">
              <span>See how it works</span>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
            </button>
          </div>
        </div>
        {/* Scroll cue */}
        <div className="absolute bottom-20 left-0 right-0 z-20 flex justify-center">
          <div className="animate-bounce opacity-40 cursor-pointer" onClick={()=>scrollTo('contract-review')}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="1.5"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
          </div>
        </div>
      </div>

      {/* ── Scrolling Use Cases ── */}
      <div className="flex flex-col md:flex-row items-center gap-8 md:gap-16 px-8 md:px-16 py-16" style={{background:'#050505',borderTop:'1px solid rgba(255,255,255,0.05)'}}>
        <div className="shrink-0 text-sm text-gray-500 md:max-w-[160px] text-center md:text-left">
          <span>The top legal teams<br/>use Harveyy for</span>
        </div>
        <div className="relative overflow-hidden flex-1" style={{height:'260px'}}>
          <div className="absolute inset-x-0 top-0 z-10 pointer-events-none" style={{height:'110px',background:'linear-gradient(to bottom,#050505 30%,transparent 100%)'}} />
          <div className="absolute inset-x-0 bottom-0 z-10 pointer-events-none" style={{height:'110px',background:'linear-gradient(to top,#050505 30%,transparent 100%)'}} />
          <div className="use-case-scroll">
            {['Contract Review','Legal Research','Compliance Checks','Risk Scoring','Executive Approval','Clause Extraction','Due Diligence','Redlining','GDPR Analysis','NDA Review','Manufacturing Law','Litigation Support',
              'Contract Review','Legal Research','Compliance Checks','Risk Scoring','Executive Approval','Clause Extraction','Due Diligence','Redlining','GDPR Analysis','NDA Review','Manufacturing Law','Litigation Support'
            ].map((item,i)=>(
              <div key={i} className="font-serif text-3xl md:text-5xl py-1.5 text-white" style={{fontStyle:'italic',lineHeight:1.15,opacity:0.85}}>{item}</div>
            ))}
          </div>
        </div>
        <button onClick={onEnter} className="shrink-0 px-5 py-2.5 border border-white/20 rounded text-xs text-gray-400 hover:text-white hover:border-white/50 transition">Explore Platform →</button>
      </div>

      {/* ── Value Props Strip ── */}
      <div className="px-8 md:px-16 py-20" style={{background:'#0a0a0a',borderTop:'1px solid rgba(255,255,255,0.06)'}}>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-16 max-w-6xl">
          <div>
            <h2 className="text-xs uppercase tracking-[.25em] text-gray-500 mb-6">Today</h2>
            <div className="space-y-4">
              {["Legal teams are overwhelmed by repetitive requests","Work is trapped in inboxes and individual knowledge","Contract review is slow and inconsistent","Business teams wait too long","High-risk issues can be missed"].map((t,i)=>(
                <div key={i} className="flex items-start gap-3">
                  <div className="w-1.5 h-1.5 rounded-full bg-red-400/60 mt-2 shrink-0"/>
                  <p className="text-sm text-gray-400 leading-relaxed">{t}</p>
                </div>
              ))}
            </div>
          </div>
          <div>
            <h2 className="text-xs uppercase tracking-[.25em] text-gray-500 mb-6">With Harveyy</h2>
            <div className="space-y-5">
              {[{title:"Speed",desc:"Routine first-pass legal work gets done in minutes, not hours or days."},
                {title:"Consistency",desc:"Every contract and inquiry is checked against the same playbook, risk matrix, and precedent logic."},
                {title:"Risk reduction",desc:"The platform catches missing clauses, nonstandard terms, jurisdiction issues, and compliance red flags before they become expensive problems."},
                {title:"Firm standards enforcement",desc:"Automatically flags deviations from your playbook and gold-standard requirements."},
                {title:"Better lawyer leverage",desc:"Lawyers stop wasting time on triage and spend more time on negotiation, strategy, and hard judgment calls."}
              ].map((item,i)=>(
                <div key={i} className="flex items-start gap-3">
                  <div className="w-1.5 h-1.5 rounded-full bg-white mt-2 shrink-0"/>
                  <div><p className="text-sm text-white font-medium mb-0.5">{item.title}</p><p className="text-sm text-gray-400 leading-relaxed">{item.desc}</p></div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* ── CONTRACT REVIEW ── */}
      <div id="contract-review" className="px-8 md:px-16 py-24" style={{background:'#080808'}}>
        <div className="max-w-6xl mx-auto">
          <p className="text-xs uppercase tracking-[.25em] text-gray-500 mb-3">Contract Review</p>
          <h2 className="text-3xl md:text-5xl font-serif mb-4" style={{fontStyle:'italic'}}>From upload to redline in 60 seconds.</h2>
          <p className="text-gray-400 max-w-xl mb-12 text-sm leading-relaxed">Harveyy reads every clause, flags risk by severity, and proposes specific redlines — before a lawyer even opens the document.</p>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">
            {[
              {icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>,title:"Clause Detection",desc:"Every clause extracted and labelled — liability, IP, termination, force majeure, warranties and more."},
              {icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>,title:"Risk Scoring",desc:"Each clause scored HIGH / MEDIUM / LOW with an overall 0–10 risk index and executive summary."},
              {icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>,title:"Proposed Redlines",desc:"For every HIGH risk clause, Harveyy drafts a replacement with legal rationale."},
            ].map((c,i)=>(
              <div key={i} className="rounded-2xl p-6" style={{background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)'}}>
                <div className="text-gray-400 mb-3">{c.icon}</div>
                <p className="text-white font-medium text-sm mb-1.5">{c.title}</p>
                <p className="text-gray-500 text-xs leading-relaxed">{c.desc}</p>
              </div>
            ))}
          </div>
          <div className="flex flex-wrap gap-2">
            {['NDA','DPA / GDPR','Manufacturing','Litigation','SaaS','Employment','M&A','Consulting'].map(t=>(
              <span key={t} className="px-3 py-1 rounded-full text-xs text-gray-400" style={{border:'1px solid rgba(255,255,255,0.1)'}}>{t}</span>
            ))}
          </div>
        </div>
      </div>

      {/* ── LEGAL RESEARCH ── */}
      <div id="legal-research" className="px-8 md:px-16 py-24" style={{background:'#060606',borderTop:'1px solid rgba(255,255,255,0.05)'}}>
        <div className="max-w-6xl mx-auto">
          <p className="text-xs uppercase tracking-[.25em] text-gray-500 mb-3">Legal Research</p>
          <h2 className="text-3xl md:text-5xl font-serif mb-4" style={{fontStyle:'italic'}}>Instant answers. Zero hallucination.</h2>
          <p className="text-gray-400 max-w-xl mb-12 text-sm leading-relaxed">Ask anything in English, Deutsch, or हिन्दी. Harveyy retrieves answers grounded in your firm's knowledge base and EU/German law — with citations.</p>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {[
              {title:"RAG-Powered Knowledge Base",desc:"Answers are retrieved from a live vector database seeded with GDPR, BGB, LkSG, NDA standards, product liability directives, and your firm's own policies."},
              {title:"Multi-Language Support",desc:"Ask questions in English, German, or Hindi. The agent understands jurisdiction-specific nuance and responds in the language you ask in."},
              {title:"Cited & Verifiable",desc:"Every answer references the clause or article it draws from. No black-box outputs — lawyers can trace every conclusion back to its source."},
              {title:"Always Learning",desc:"Upload new precedents, policies, and playbooks at any time. The knowledge base updates instantly and reflects in all future answers."},
            ].map((c,i)=>(
              <div key={i} className="rounded-2xl p-6 flex gap-4" style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.07)'}}>
                <div className="w-1 rounded-full shrink-0 mt-1" style={{background:'rgba(255,255,255,0.15)',minHeight:'40px'}}/>
                <div>
                  <p className="text-white font-medium text-sm mb-1.5">{c.title}</p>
                  <p className="text-gray-500 text-xs leading-relaxed">{c.desc}</p>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* ── COMPLIANCE ── */}
      <div id="compliance" className="px-8 md:px-16 py-24" style={{background:'#080808',borderTop:'1px solid rgba(255,255,255,0.05)'}}>
        <div className="max-w-6xl mx-auto">
          <p className="text-xs uppercase tracking-[.25em] text-gray-500 mb-3">Compliance</p>
          <h2 className="text-3xl md:text-5xl font-serif mb-4" style={{fontStyle:'italic'}}>Built for German & EU law.</h2>
          <p className="text-gray-400 max-w-xl mb-12 text-sm leading-relaxed">Every contract is automatically checked against the regulatory frameworks that matter — before a single human review hour is spent.</p>
          <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
            {[
              {law:"GDPR Art. 28",desc:"Subprocessor obligations, breach notification windows, and DPA clause completeness."},
              {law:"Schrems II",desc:"Cross-border data transfer safeguards — SCCs, adequacy decisions, and supplementary measures."},
              {law:"LkSG",desc:"German Supply Chain Due Diligence Act — human rights and environmental risk in supplier contracts."},
              {law:"EU Product Liability",desc:"CE marking requirements, defect warranty, and recall procedure checks for manufacturing agreements."},
              {law:"BGB §§ 305–310",desc:"Standard Terms Control — unfair clause detection under German civil code for B2B and B2C contracts."},
              {law:"Litigation Standards",desc:"Damages caps, jurisdiction clauses, limitation periods, and settlement enforceability."},
            ].map((c,i)=>(
              <div key={i} className="rounded-xl p-5" style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.08)'}}>
                <p className="text-white text-xs font-semibold mb-2 tracking-wide">{c.law}</p>
                <p className="text-gray-500 text-xs leading-relaxed">{c.desc}</p>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* ── AGENTS ── */}
      <div id="agents" className="px-8 md:px-16 py-24" style={{background:'#060606',borderTop:'1px solid rgba(255,255,255,0.05)'}}>
        <div className="max-w-6xl mx-auto">
          <p className="text-xs uppercase tracking-[.25em] text-gray-500 mb-3">Agents</p>
          <h2 className="text-3xl md:text-5xl font-serif mb-4" style={{fontStyle:'italic'}}>Five agents. One seamless pipeline.</h2>
          <p className="text-gray-400 max-w-xl mb-12 text-sm leading-relaxed">Harveyy doesn't use a single AI. It runs a coordinated team of specialised agents — each responsible for a discrete legal task.</p>
          <div className="grid grid-cols-1 md:grid-cols-5 gap-3 mb-10">
            {[
              {num:"01",name:"Intake",desc:"Classifies contract type, extracts parties, jurisdiction, and key metadata."},
              {num:"02",name:"Contract Review",desc:"Extracts and risk-scores every clause. Flags deviations from firm standards."},
              {num:"03",name:"Legal Research",desc:"RAG lookup over legal knowledge base for relevant precedents and regulations."},
              {num:"04",name:"Drafting",desc:"Proposes specific redline edits for every HIGH risk clause with rationale."},
              {num:"05",name:"Orchestrator",desc:"Coordinates all agents, manages the pipeline, routes decisions to the right people."},
            ].map((a,i)=>(

function RiskBadge({level}){
  const c={HIGH:"bg-red-500/20 text-red-400 border-red-500/40",MEDIUM:"bg-amber-500/20 text-amber-400 border-amber-500/40",LOW:"bg-blue-500/20 text-blue-400 border-blue-500/40",INFO:"bg-gray-500/20 text-gray-400 border-gray-500/40"};
  return <span className={`px-2 py-0.5 rounded text-xs font-semibold border ${c[level]||c.INFO}`}>{level}</span>;
}

function ScoreRing({score,size=80}){
  const pct=score*10,color=score>=7?"#ef4444":score>=4?"#f59e0b":"#22c55e",r=32,circ=2*Math.PI*r;
  return(
    <div className="relative" style={{width:size,height:size}}>
      <svg viewBox="0 0 80 80" className="w-full h-full -rotate-90">
        <circle cx="40" cy="40" r={r} fill="none" stroke="#1a1a2a" strokeWidth="6"/>
        <circle cx="40" cy="40" r={r} fill="none" stroke={color} strokeWidth="6" strokeDasharray={circ} strokeDashoffset={circ*(1-pct/100)} strokeLinecap="round" style={{transition:'stroke-dashoffset 1s ease'}}/>
      </svg>
      <div className="absolute inset-0 flex items-center justify-center"><span className="text-xl font-bold">{score}</span></div>
    </div>
  );
}

function ContractViewer({text,clauses=[]}){
  if(!text)return null;
  let html=text.replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const sorted=[...clauses].sort((a,b)=>(b.original_text||"").length-(a.original_text||"").length);
  sorted.forEach(cl=>{
    if(!cl.original_text)return;
    const snippet=cl.original_text.substring(0,80).trim();
    const esc=snippet.replace(/[.*+?^${}()|[\]\\]/g,'\\$&').replace(/\s+/g,'[\\s\\S]{0,4}');
    try{
      const re=new RegExp(`(${esc}[^<]{0,200})`,"i");
      const l=(cl.risk_level||"LOW").toLowerCase();
      const colors={high:"background:#fee2e2;border-bottom:2px solid #ef4444;cursor:pointer",medium:"background:#fef9c3;border-bottom:2px solid #eab308;cursor:pointer",low:"background:#dcfce7;border-bottom:2px solid #22c55e;cursor:pointer"};
      const style=colors[l]||colors.low;
      const tooltip=(cl.clause_type||"")+" ("+(cl.risk_level||"").toUpperCase()+"): "+(cl.explanation||"").substring(0,120);
      if(!html.includes(`data-clause="${cl.clause_type}"`))
        html=html.replace(re,`<mark data-clause="${cl.clause_type}" style="${style};border-radius:2px;padding:1px 2px" title="${tooltip.replace(/"/g,"'")}">$1</mark>`);
    }catch(e){}
  });
  return(
    <div className="bg-white rounded-xl border border-[#e8e5e0] max-h-[550px] overflow-auto shadow-sm">
      <div className="px-5 py-3 border-b border-[#f0ede8] flex items-center gap-3 sticky top-0 bg-white z-10">
        <span className="text-xs font-semibold text-[#333] uppercase tracking-wider">Document</span>
        {clauses.length>0&&<span className="text-xs px-2 py-0.5 bg-amber-100 text-amber-700 rounded-full">{clauses.length} clause{clauses.length!==1?"s":""} flagged</span>}
        <span className="text-xs text-[#bbb] ml-auto">Hover highlights for details</span>
      </div>
      <div className="px-8 py-6 font-serif text-[13px] text-[#1a1a1a] leading-7 whitespace-pre-wrap" style={{fontFamily:"'Georgia',serif"}} dangerouslySetInnerHTML={{__html:html}}/>
    </div>
  );
}

const PIPELINE_STEPS=[
  {num:1,label:"Contract Received",agent:"system"},
  {num:2,label:"Intake Agent — Classify Matter",agent:"intake_agent"},
  {num:3,label:"Clause Extraction — Key DPA Terms",agent:"clause_agent"},
  {num:4,label:"GDPR Compliance Check",agent:"compliance_agent"},
  {num:5,label:"Risk Agent — Score DPA",agent:"risk_agent"},

  {num:8,label:"Approval Agent — Slack Notification",agent:"approval_agent"},

];

function PipelineProgress({running,pipelineResult,animStep}){
  const [expandedStep,setExpandedStep]=React.useState(null);
  const audit=pipelineResult?.audit_trail||[];
  const completedSteps=new Set(audit.map(a=>a.step));
  const d=pipelineResult;

  const stepDetail=(num)=>{
    if(!d)return null;
    if(num===1)return d.audit_trail?.find(a=>a.step===1)?.details||null;
    if(num===2)return d.intake?`${d.intake.contract_type||"DPA"} | Parties: ${(d.intake.parties||[]).join(", ")||"?"} | ${d.intake.jurisdiction||"?"} | ${d.intake.urgency||"?"} urgency`:null;
    if(num===3){
      const cls=d.clauses?.clauses||[];
      const h=cls.filter(c=>c.risk==="HIGH").length,m=cls.filter(c=>c.risk==="MEDIUM").length,l=cls.filter(c=>c.risk==="LOW").length;
      return cls.length?`${cls.length} clauses — ${h} HIGH, ${m} MEDIUM, ${l} LOW`:null;
    }
    if(num===4)return d.gdpr?`GDPR ${d.gdpr.gdpr_score}/10 | ${d.gdpr.transfer_mechanism||"?"} | Subprocessor: ${d.gdpr.subprocessor_clause?"✓":"✗"} | Breach notif: ${d.gdpr.breach_notification?"✓":"✗"} | ${(d.gdpr.issues||[]).length} issues`:null;
    if(num===5)return d.risk?`${d.risk.risk_score}/10 ${d.risk.risk_level} | Safe to sign: ${d.risk.safe_to_sign?"YES":"NO"} | ${d.risk.executive_summary||""}`:null;
    if(num===6)return d.redlines?`${(d.redlines.redlines||[]).length} redlines proposed`:null;
    if(num===7)return d.memo?`Recommendation: ${d.memo.recommendation} | ${(d.memo.conditions||[]).length} conditions | Verified by: ${d.memo.verified_by||"AI"}`:null;
    if(num===8)return d.legal_slack_sent?"✅ Slack sent to Legal Team":"⚠️ No legal_team webhook — add one in Settings";
    if(num===9)return"⏳ Awaiting Legal Team review — click link in Slack or use Review panel below";
    if(num===10)return`Audit trail: ${(d.audit_trail||[]).length} entries logged`;
    return null;
  };

  const stepExpanded=(num)=>{
    if(!d)return null;
    const cls=d.clauses?.clauses||[];
    if(num===3)return(<div className="space-y-1 mt-2">{cls.slice(0,5).map((c,i)=>(<div key={i} className="flex gap-2 items-start text-xs"><span className={`px-1 rounded font-bold flex-shrink-0 ${c.risk==="HIGH"?"bg-red-100 text-red-700":c.risk==="MEDIUM"?"bg-amber-100 text-amber-700":"bg-green-100 text-green-700"}`}>{c.risk}</span><span className="text-[#555]"><b>{c.name}</b>: {c.issue}</span></div>))}</div>);
    if(num===4)return(<div className="space-y-1 mt-2">{(d.gdpr?.issues||[]).map((i,idx)=>(<p key={idx} className="text-xs text-[#555]">⚠️ <b>{i.article}</b>: {i.issue}</p>))}</div>);
    if(num===5)return(<div className="mt-2 space-y-1">{(d.risk?.top_risks||[]).map((r,i)=>(<p key={i} className="text-xs text-[#555]">• {r}</p>))}</div>);
    if(num===6)return(<div className="space-y-1 mt-2">{(d.redlines?.redlines||[]).slice(0,3).map((r,i)=>(<div key={i} className="text-xs border-l-2 border-green-300 pl-2"><p className="font-medium text-[#333]">{r.clause}</p><p className="text-green-700">{r.proposed_redline?.substring(0,120)}</p></div>))}</div>);
    if(num===7)return d.memo?.memo?(<p className="text-xs text-[#555] mt-2 leading-relaxed">{d.memo.memo.substring(0,400)}…</p>):null;
    return null;
  };

  const ragSteps=new Set([3,4,5,7]);

  // Auto-expand all steps once pipeline finishes
  React.useEffect(()=>{
    if(!running&&d&&expandedStep===null)setExpandedStep("all");
  },[running,d]);
  const isExpanded=(num)=>expandedStep==="all"||expandedStep===num;

  return(
    <div className="space-y-1">
      {!running&&d&&<div className="flex justify-end mb-1">
        <button onClick={()=>setExpandedStep(expandedStep==="all"?null:"all")} className="text-xs text-[#888] hover:text-[#333] px-2 py-0.5 border border-[#e8e5e0] rounded">
          {expandedStep==="all"?"Collapse all":"Expand all"}
        </button>
      </div>}
      {PIPELINE_STEPS.map(s=>{
        const done=completedSteps.has(s.num);
        const active=running&&animStep===s.num;
        const detail=stepDetail(s.num);
        const expanded=isExpanded(s.num);
        const hasExpanded=done&&stepExpanded(s.num);
        return(
          <div key={s.num} className={`rounded-lg border transition-all ${done?"border-green-200 bg-green-50":active?"border-indigo-200 bg-indigo-50":"border-[#f0ede8] bg-[#fafaf9]"}`}>
            <div className={`flex items-center gap-2.5 px-3 py-2 ${hasExpanded?"cursor-pointer":""}`}
              onClick={()=>hasExpanded&&setExpandedStep(expanded?null:s.num)}>
              <div className={`w-5 h-5 rounded-full flex items-center justify-center flex-shrink-0 text-xs font-bold ${done?"bg-green-500 text-white":active?"bg-indigo-500 text-white animate-pulse":"bg-[#e8e5e0] text-[#999]"}`}>
                {done?"✓":active?"↻":s.num}
              </div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-1.5 flex-wrap">
                  <p className={`text-xs font-medium ${done?"text-green-800":active?"text-indigo-700":"text-[#555]"}`}>{s.label}</p>
                  {done&&ragSteps.has(s.num)&&<span className="text-[11px] px-1 py-0.5 bg-violet-100 text-violet-600 rounded font-semibold">RAG</span>}
                </div>
                {detail&&<p className="text-xs text-[#777] mt-0.5 leading-snug">{detail}</p>}
              </div>
              <div className="flex items-center gap-1 flex-shrink-0">
                {done&&<span className="text-[11px] px-1.5 py-0.5 rounded-full bg-green-100 text-green-700">done</span>}
                {active&&<span className="text-[11px] px-1.5 py-0.5 rounded-full bg-indigo-100 text-indigo-600 animate-pulse">running…</span>}
                {hasExpanded&&<span className="text-[#bbb] text-xs">{expanded?"▲":"▼"}</span>}
              </div>
            </div>
            {expanded&&hasExpanded&&(
              <div className="px-3 pb-2.5 border-t border-green-100">{stepExpanded(s.num)}</div>
            )}
          </div>
        );
      })}
    </div>
  );
}

  const runPipeline=async(textOverride,labelOverride)=>{
    const text=textOverride||contractText;
    const label=labelOverride||"contract";
    if(!text||text.trim().length<50){if(!textOverride)alert("Upload a contract first.");return;}

    setPipelineRunning(true);setPipelineResult(null);setPipelineAnimStep(1);setResult(null);setSimplifyResult(null);setLegalNotes("");
    setChatMsgs(p=>[...p,{role:"ai",text:`🚀 Starting 10-step pipeline for "${label}"...`,ts:new Date().toLocaleTimeString()}]);
    let step=1;
    const stepLabels=["Receiving contract","Intake classification","Clause extraction","GDPR compliance check","Risk scoring","Drafting redlines","QA memo","Slack approval","Awaiting sign-off","Audit trail"];
    let animInterval=setInterval(()=>{
      step=Math.min(step+1,9);
      setPipelineAnimStep(step);
      setChatMsgs(p=>{
        const last=p[p.length-1];
        if(last&&last.pipeline)return [...p.slice(0,-1),{...last,text:`⚙️ Step ${step}: ${stepLabels[step-1]}...`}];
        return [...p,{role:"ai",text:`⚙️ Step ${step}: ${stepLabels[step-1]}...`,ts:new Date().toLocaleTimeString(),pipeline:true}];

      const pClauses=(d.clauses?.clauses||[]).map(c=>({

        risk_level:(c.risk||"LOW").toLowerCase(),

      fetchKBCitations(d.clauses?.clauses||[]);
    }catch(err){
      setPipelineResult({error:err.message});
      setChatMsgs(p=>p.filter(m=>!m.pipeline));
      setChatMsgs(p=>[...p,{role:"ai",text:"Pipeline error: "+err.message,ts:new Date().toLocaleTimeString()}]);

          setChatMsgs(p=>[...p,{role:"ai",text:`⚠️ "${f.name}" is a scanned/image PDF with no extractable text.`,ts:new Date().toLocaleTimeString()}]);

  const prevLen=useRef(0);

  const searchRAG=async()=>{if(!ragQuery.trim())return;setLoading(true);

        fetch(`${API}/api/rag/search`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({query:ragQuery,n_results:5})}).then(r=>r.json()),
        fetch(`${API}/api/chat`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(chatBody)}).then(r=>r.json()).catch(()=>null),

  const rv=result?.agent_results?.contract_review||(result?.agent==="contract_review"?result:null);

  const rs=result?.agent_results?.legal_research||(result?.agent==="legal_research"?result:null);
  const qa=result?.agent_results?.qa_review||null;

  const urgentCount=triageCases.filter(c=>c.hoursLeft<=24).length;
  const tabs=[{id:"review",label:"Contract Review",ic:"M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"},
    {id:"triage",label:`Triage${urgentCount?` (${urgentCount})`:``}`,ic:"M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"},
    {id:"draft",label:"Draft Contract",ic:"M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"},
    {id:"research",label:"Legal Research",ic:"M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"},
    {id:"matter",label:"Full Matter",ic:"M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"},
    {id:"rag",label:"Q&A",ic:"M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"},
    {id:"kb",label:"Knowledge Base",ic:"M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"},
    {id:"history",label:"History",ic:"M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"}];

  const doApproval=async(decision)=>{

      const r=await fetch(`${API}/api/approvals/${approveData.matter_id}/${decision.toLowerCase()}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({comment:approveComment})});

  };

  if(approveData&&!approveDecided){
    const sm=approveData.simplified_memo||approveData.simplified||{};
    const rec=approveData.recommendation||sm.recommendation||"NEGOTIATE";
    const risks=approveData.plain_risks||sm.plain_risks||[];
    const summary=approveData.executive_summary||sm.executive_summary||approveData.memo?.memo?.substring(0,500)||"";
    const decisionNeeded=approveData.decision_needed||sm.decision_needed||"Review and decide";
    const plr=approveData.post_legal_risk||null;
    const riskScore=plr?plr.score:(approveData.risk?.risk_score||0);
    const riskLevel=plr?plr.level:(approveData.risk?.risk_level||"MEDIUM");
    const originalScore=plr?plr.original_score:(approveData.risk?.risk_score||0);
    const originalLevel=plr?plr.original_level:(approveData.risk?.risk_level||"MEDIUM");

        </div>

                    <button className="px-3 py-1.5 rounded-lg text-xs border border-[#e0ddd8] bg-white hover:bg-[#fafaf9] transition flex items-center gap-1.5 opacity-50"><span className="text-orange-400">&#9679;</span> SharePoint</button>

                  </div>
                </div>

                    <div><p className="text-sm font-medium text-[#333]">Contract loaded</p><p className="text-sm text-[#999]">{contractText.length.toLocaleString()} characters</p></div>

                <details className="text-xs">
                  <summary className="text-[#999] cursor-pointer hover:text-[#666]">Preview contract text</summary>
                  <pre className="mt-2 max-h-40 overflow-auto text-sm text-[#666] bg-[#fafaf9] rounded-lg p-3 font-mono whitespace-pre-wrap">{contractText.slice(0,1500)}{contractText.length>1500?"...":""}</pre>

                  <div><h3 className="text-sm font-semibold text-[#333]">Before we review...</h3><p className="text-xs text-[#999]">Help the AI focus. Skip any you don't need.</p></div>
                </div>
                <div className="space-y-2.5">
                  {intakeQs.map((q,i)=>(<div key={q.id} className="slide-in" style={{animationDelay:`${i*50}ms`}}>

                    {q.type==="multiselect"?(
                      <div className="flex flex-wrap gap-1">
                        {q.options.map(o=>{const sel=(Array.isArray(q.answer)?q.answer:[]).includes(o);return(<button key={o} onClick={()=>{const cur=Array.isArray(q.answer)?q.answer:[];updateIntakeAnswer(q.id,sel?cur.filter(x=>x!==o):[...cur,o]);}}

                      <div className="flex flex-wrap gap-1">
                        {q.options.map(o=>(<button key={o} onClick={()=>updateIntakeAnswer(q.id,o)}

                      <input value={q.answer} onChange={e=>updateIntakeAnswer(q.id,e.target.value)}

                    )}
                  </div>))}

                <div className="flex gap-2 flex-wrap">

                  </button>
                  <button onClick={()=>{setIntakeStep(2);callAPI("/api/review",{contract_text:contractText})}} disabled={loading||pipelineRunning}
                    className="btn-outline px-3 py-2.5 rounded-lg text-sm transition">Skip</button>
                </div>
              </div>)}

              )}

                  <span className="text-xs px-2 py-0.5 bg-[#f5f3f0] rounded text-[#999]">{triageList.length} items</span>
                </div>
                <div className="space-y-1.5">
                  {triageList.map(t=>(<div key={t.id} className="flex items-center gap-2.5 p-2 rounded-lg hover:bg-[#fafaf9] transition cursor-pointer group"
                    onClick={()=>{if(t.name.includes("BMW"))loadBMW();else if(t.name.includes("NDA"))loadSample()}}>
                    <div className={`w-2 h-2 rounded-full shrink-0 ${t.status==='needs_review'?'bg-red-400':t.status==='in_review'?'bg-amber-400':'bg-green-400'}`}/>
                    <div className="flex-1 min-w-0">
                      <p className="text-xs font-medium text-[#333] truncate">{t.name}</p>
                      <div className="flex items-center gap-2 text-xs text-[#999]">
                        <span>{t.type}</span><span>&middot;</span><span>{t.uploaded}</span><span>&middot;</span><span>{t.assignee}</span>
                      </div>
                    </div>
                    <span className={`text-xs px-2 py-0.5 rounded-full shrink-0 ${t.status==='needs_review'?'bg-red-50 text-red-600':t.status==='in_review'?'bg-amber-50 text-amber-600':'bg-green-50 text-green-600'}`}>
                      {t.status.replace(/_/g,' ')}</span>
                  </div>))}
                </div>
              </div>

              {/* ── Team Members ── */}
              <div className="card p-4">
                <button onClick={()=>setShowTeam(!showTeam)} className="flex items-center justify-between w-full">

                    <div className="flex -space-x-1.5">
                      {teamMembers.map(m=>(<div key={m.id} className={`w-5 h-5 rounded-full flex items-center justify-center text-[11px] font-bold text-white ${m.name==='AI Agent'?'bg-indigo-600':'bg-[#1a1a1a]'} ring-2 ring-white`}>{m.avatar}</div>))}
                    </div>
                    <svg className={`w-3.5 h-3.5 text-[#999] transition ${showTeam?'rotate-180':''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7"/></svg>
                  </div>
                </button>
                {showTeam&&(<div className="mt-3 space-y-2 slide-in">
                  {teamMembers.map(m=>(<div key={m.id} className="flex items-center gap-3 p-2 rounded-lg hover:bg-[#fafaf9]">
                    <div className="relative">
                      <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold text-white ${m.name==='AI Agent'?'bg-indigo-600':'bg-[#1a1a1a]'}`}>{m.avatar}</div>
                      <div className={`absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 rounded-full border-2 border-white ${m.status==='online'?'bg-green-400':'bg-amber-400'}`}/>

                    <div className="flex-1 min-w-0">
                      <p className="text-xs font-medium text-[#333]">{m.name}</p>
                      <p className="text-xs text-[#999]">{m.role}</p>
                    </div>
                    <div className="flex flex-wrap gap-0.5 max-w-[100px]">
                      {m.permissions.map(p=>(<span key={p} className={`text-[8px] px-1.5 py-0.5 rounded ${p==='admin'?'bg-red-50 text-red-600':p==='approve'?'bg-green-50 text-green-600':'bg-[#f5f3f0] text-[#888]'}`}>{p}</span>))}
                    </div>
                  </div>))}
                </div>)}
              </div>

                    <p className="text-xs text-[#ddd] mt-1">"Check for GDPR issues" &middot; "Ist diese Klausel nach BGB durchsetzbar?" &middot; "इस अनुबंध में क्या जोखिम हैं?"</p>

                      <div style={{whiteSpace:'pre-wrap'}}>{m.text}</div>

                    </div>

                  <button onClick={sendChat} disabled={loading||!chatInput.trim()}
                    className="px-3 py-2 bg-[#1a1a1a] text-white rounded-lg hover:bg-[#333] transition disabled:opacity-30">
                    <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                  </button>
                </div>
              </div>

            </div>)}

            {tab==="triage"&&(<div className="space-y-4">

              <div className="rounded-xl p-4" style={{background:'linear-gradient(135deg,#dc2626,#991b1b)'}}>
                <div className="flex items-center gap-3">

                    <svg className="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>

                <div className="card p-3 text-center"><p className="text-lg font-semibold text-amber-600">{triageCases.filter(c=>c.status==='pending_review').length}</p><p className="text-xs text-[#999] uppercase">Pending Review</p></div>
                <div className="card p-3 text-center"><p className="text-lg font-semibold text-green-600">{triageCases.filter(c=>c.status==='in_progress').length}</p><p className="text-xs text-[#999] uppercase">In Progress</p></div>

                        <span className={`text-[11px] px-1.5 py-0.5 rounded-full ${c.status==='critical'?'bg-red-600 text-white':c.status==='escalated'?'bg-red-100 text-red-600':c.status==='pending_review'?'bg-amber-100 text-amber-600':'bg-blue-100 text-blue-600'}`}>{c.status.replace(/_/g,' ')}</span>
                        <span className="text-[11px] px-1.5 py-0.5 bg-[#f5f3f0] rounded text-[#888]">{c.type}</span>

                  </div>

                      </div>
                      <span className="text-xs text-[#bbb]">{c.contract}</span>
                    </div>
                    <div className="flex items-center gap-2">
                      <span className={`text-xs font-semibold ${c.hoursLeft<=12?'text-red-600':c.hoursLeft<=24?'text-amber-600':'text-[#888]'}`}>
                        {c.hoursLeft<=12?`${c.hoursLeft}h left`:c.hoursLeft<=24?`${c.hoursLeft}h left`:`${Math.floor(c.hoursLeft/24)}d ${c.hoursLeft%24}h`}
                      </span>
                      <button onClick={()=>{setTriageCases(p=>p.map(x=>x.id===c.id?{...x,status:'in_progress'}:x))}}

                    </div>
                  </div>
                </div>))}
              </div>
            </div>)}

            {tab==="draft"&&(<div className="space-y-4">

              {/* Pipeline-generated executive draft */}
              {pipelineDraft&&(<div className="card p-5 border-l-4 border-l-indigo-500 space-y-4">
                <div className="flex items-start justify-between gap-3">

                    <span className="text-xs px-2 py-0.5 bg-indigo-100 text-indigo-600 rounded-full ml-auto">{result.rag_insights.length} matches</span>
                  </div>
                  <div className="space-y-2">
                    {result.rag_insights.map((r,i)=>(
                      <div key={i} className="bg-white rounded-lg p-3 border border-indigo-100 text-xs slide-in" style={{animationDelay:`${i*50}ms`}}>
                        {r.source&&<p className="text-xs text-indigo-400 font-medium uppercase tracking-wide mb-1">{r.source}</p>}
                        <p className="text-[#444] leading-relaxed">{(r.text||r.content||r.document||"").substring(0,200)}{(r.text||r.content||r.document||"").length>200?"…":""}</p>
                        {r.similarity!=null&&<p className="text-xs text-[#bbb] mt-1">Relevance: {Math.round((r.similarity||0)*100)}%</p>}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Annotated Contract */}
              {contractText&&(<div className="card p-6">
                <div className="flex items-center gap-2 mb-3">
                  <h3 className="card-header text-base">Annotated Contract</h3>
                  <span className="text-xs px-2 py-0.5 bg-[#f5f3f0] rounded text-[#999]">Hover highlighted text for details</span>
                </div>
                <ContractViewer text={contractText} clauses={rv.clauses_found||[]}/>
              </div>)}

              {/* Internal Playbook Citations */}
              {kbCitations.length>0&&(<div className="card p-5 border-l-4 border-l-amber-400 space-y-3">
                <div className="flex items-center gap-2 mb-1">
                  <span className="text-base">📖</span>
                  <h3 className="card-header text-base text-amber-800">Internal Playbook Violations</h3>
                  <span className="text-xs px-2 py-0.5 bg-amber-50 text-amber-700 rounded-full border border-amber-200">{kbCitations.length} non-adherences found</span>
                </div>
                <p className="text-sm text-[#888]">The following clauses conflict with your firm's internal policies and legal standards:</p>
                {kbCitations.map((c,i)=>(
                  <div key={i} className="bg-amber-50 rounded-lg p-3.5 border border-amber-200 space-y-2 slide-in" style={{animationDelay:`${i*60}ms`}}>
                    <div className="flex items-center gap-2">
                      <RiskBadge level={c.risk_level||"MEDIUM"}/>
                      <span className="text-xs font-semibold text-[#333]">{c.clause_type}</span>
                    </div>
                    <div className="bg-white rounded p-2.5 border border-amber-100">
                      <p className="text-xs font-semibold text-amber-700 uppercase mb-1">Your playbook states ({c.source}):</p>
                      <p className="text-sm text-[#555] italic leading-relaxed">"{c.kb_passage}"</p>
                    </div>
                    <p className="text-sm text-red-700 font-medium">⚠ This contract does not adhere: {c.issue}</p>
                  </div>
                ))}
              </div>)}

              {/* Flagged Clauses */}
              <div className="card p-6 space-y-2">
                <h3 className="card-header text-base mb-1">Flagged Clauses</h3>
                {(rv.clauses_found||[]).map((cl,i)=>(<div key={i} className="bg-[#fafaf9] rounded-lg p-3 border border-[#e8e5e0] slide-in" style={{animationDelay:`${i*60}ms`}}>
                  <div className="flex items-center gap-2 mb-1.5"><RiskBadge level={cl.risk_level}/><span className="text-sm font-medium text-[#333]">{cl.clause_type}</span><span className="text-sm text-[#bbb] ml-auto">{cl.section}</span></div>
                  <p className="text-xs text-[#666] mb-1.5">{cl.explanation}</p>
                  {cl.suggestion&&<p className="text-xs text-blue-600">Suggestion: {cl.suggestion}</p>}

                    <pre className="text-sm text-green-800 bg-green-50 rounded p-2 mt-1 whitespace-pre-wrap border border-green-200">{cl.suggested_replacement}</pre></details>)}
                </div>))}
              </div>

              {/* Errors Found */}
              {rv.errors_found?.length>0&&(<div className="card border-red-200 p-6 space-y-2">
                <h3 className="card-header text-base text-red-700">Errors & Issues</h3>
                {rv.errors_found.map((err,i)=>(<div key={i} className="bg-red-50 rounded-lg p-3 border border-red-200 slide-in">
                  <div className="flex items-center gap-2 mb-1"><RiskBadge level={err.severity||"MEDIUM"}/><span className="text-xs text-red-700 font-medium">{err.type}</span></div>
                  <p className="text-xs text-[#666]">{err.description}</p>
                  {err.original_text&&<p className="text-sm text-[#999] mt-1 italic">"{err.original_text.substring(0,120)}"</p>}
                </div>))}
              </div>)}

              {rv.missing_protections?.length>0&&(<div className="card border-amber-200 p-6 space-y-2">
                <h3 className="card-header text-base text-amber-700">Missing Protections</h3>
                {rv.missing_protections.map((mp,i)=>(<div key={i} className="bg-amber-50 rounded-lg p-3 border border-amber-200">
                  <div className="flex items-center gap-2 mb-1"><RiskBadge level={mp.importance}/><span className="text-sm text-[#333]">{mp.clause_type}</span></div>
                  <p className="text-xs text-[#666]">{mp.recommendation}</p>
                  {mp.suggested_clause&&<pre className="text-sm text-amber-800 bg-amber-50 rounded p-2 mt-2 whitespace-pre-wrap border border-amber-200">{mp.suggested_clause}</pre>}
                </div>))}
              </div>)}

              {rv.top_recommendations?.length>0&&(<div className="card p-6">
                <h3 className="card-header text-base text-green-700 mb-2">Recommendations</h3>
                {rv.top_recommendations.map((r,i)=>(<p key={i} className="text-sm text-[#555] mb-1"><span className="text-green-600 mr-2 font-medium">{i+1}.</span>{r}</p>))}
              </div>)}

              {rv.gdpr_compliance_notes&&(<div className="card p-5">
                <h3 className="text-xs font-semibold text-blue-600 mb-1">GDPR Notes</h3>
                <p className="text-xs text-[#666]">{rv.gdpr_compliance_notes}</p>
              </div>)}

              {/* Auto-Research by Legal Research Agent */}
              {result?.auto_research?.length>0&&(<div className="card p-6 space-y-3">
                <div className="flex items-center gap-2 mb-1">
                  <div className="w-6 h-6 rounded-full bg-indigo-100 flex items-center justify-center"><svg className="w-3.5 h-3.5 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg></div>
                  <h3 className="card-header text-base text-indigo-700">Auto-Research on Flagged Clauses</h3>
                  <span className="text-xs px-2 py-0.5 bg-indigo-50 text-indigo-600 rounded-full">Legal Research Agent</span>
                </div>
                {result.auto_research.map((ar,i)=>(<div key={i} className="bg-[#fafaf9] rounded-lg p-4 border border-[#e8e5e0] slide-in" style={{animationDelay:`${i*80}ms`}}>
                  <div className="flex items-center gap-2 mb-2"><RiskBadge level={ar.risk_level||"MEDIUM"}/><span className="text-sm font-medium text-[#333]">{ar.clause_type}</span></div>
                  <p className="text-xs text-[#555] leading-relaxed mb-2">{ar.research}</p>
                  {ar.applicable_laws?.length>0&&(<div className="flex flex-wrap gap-1 mb-2">{ar.applicable_laws.map((l,j)=>(<span key={j} className="text-xs px-2 py-0.5 bg-blue-50 text-blue-700 rounded">{l.law||l}</span>))}</div>)}
                  {ar.recommendation&&<p className="text-xs text-green-700 font-medium">→ {ar.recommendation}</p>}
                </div>))}
              </div>)}

              {/* Suggested Next Actions */}
              {result?.suggested_actions?.length>0&&(<div className="card p-6">
                <div className="flex items-center gap-2 mb-3">
                  <div className="w-6 h-6 rounded-full bg-amber-100 flex items-center justify-center"><svg className="w-3.5 h-3.5 text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg></div>
                  <h3 className="card-header text-base text-[#1a1a1a]">Suggested Next Steps</h3>
                </div>
                <div className="space-y-2">
                  {result.suggested_actions.map((sa,i)=>(<div key={i} className="flex items-start gap-3 p-3 rounded-lg border border-[#e8e5e0] hover:bg-[#fafaf9] transition">
                    <span className={`shrink-0 mt-0.5 w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold text-white ${sa.priority==='high'?'bg-red-500':sa.priority==='medium'?'bg-amber-500':'bg-[#999]'}`}>{i+1}</span>
                    <div className="flex-1">
                      <div className="flex items-center gap-2"><span className="text-sm font-medium text-[#333]">{sa.action.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase())}</span>

                      <p className="text-xs text-[#666] mt-0.5">{sa.reason}</p>
                    </div>
                  </div>))}
                </div>
              </div>)}

              {/* Agents Used */}
              {result?.agents_used?.length>1&&(<div className="card p-4">
                <div className="flex items-center gap-2 text-sm text-[#999]">
                  <span>Agents used:</span>
                  {result.agents_used.map((a,i)=>(<span key={i} className="px-2 py-0.5 bg-[#f5f3f0] rounded text-[#666] font-medium">{a.replace(/_/g,' ')}</span>))}
                </div>
              </div>)}
            </div>)}

            {/* ── Drafting Results ── */}
            {dr&&!result?.error&&(<div className="space-y-4 fade-in">
              <div className="card p-6">
                <div className="flex items-center justify-between mb-3">
                  <div><h2 className="card-header text-xl">{dr.contract_title||"Generated Contract"}</h2>
                    <p className="text-xs text-[#999] mt-1">Template: {dr.template_used||"custom"}</p></div>
                  <button onClick={()=>{navigator.clipboard.writeText(dr.contract_text||"")}} className="btn-outline px-3 py-1 rounded text-xs transition">Copy</button>
                </div>
                <pre className="whitespace-pre-wrap text-[13px] text-[#333] bg-[#fafaf9] rounded-lg p-5 max-h-[600px] overflow-auto font-mono leading-relaxed border border-[#e8e5e0]">{dr.contract_text}</pre>
              </div>
              {dr.jurisdiction_notes&&(<div className="card p-5"><h3 className="text-xs font-semibold text-blue-600 mb-1">Jurisdiction</h3><p className="text-xs text-[#666]">{dr.jurisdiction_notes}</p></div>)}
              {dr.custom_clauses_added?.length>0&&(<div className="card p-5"><h3 className="text-xs font-semibold text-indigo-600 mb-1">Custom Clauses</h3>{dr.custom_clauses_added.map((c,i)=><p key={i} className="text-xs text-[#666]">&bull; {c}</p>)}</div>)}
              {qa&&(<div className="card border-green-200 p-6">
                <div className="flex items-center gap-3 mb-2"><h3 className="card-header text-base text-green-700">QA Review</h3><ScoreRing score={qa.overall_risk_score||0} size={50}/></div>
                <p className="text-xs text-[#666]">{qa.executive_summary}</p>
              </div>)}

              {/* Partner Approval Status */}
              {result?.approval&&(<div className={`card p-5 border-l-4 ${result.approval.status==='approved'?'border-l-green-500':'border-l-amber-500'}`}>
                <div className="flex items-center gap-3 mb-2">
                  <span className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium ${result.approval.status==='pending'?'bg-amber-100 text-amber-800':'bg-green-100 text-green-800'}`}>
                    <span className={`w-2 h-2 rounded-full ${result.approval.status==='pending'?'bg-amber-500 animate-pulse':'bg-green-500'}`}/>
                    {result.approval.status==='pending'?'Awaiting Partner Approval':'Approved'}
                  </span>
                  <span className="text-sm text-[#999]">ID: {result.approval.approval_id}</span>
                </div>
                <p className="text-sm text-[#555]">{result.approval.message}</p>
                {result.approval.slack_sent&&<p className="text-sm text-green-600 mt-1">Slack notification sent to partner channel</p>}
                {result.approval.slack_error&&<p className="text-sm text-red-500 mt-1">Slack error: {result.approval.slack_error}</p>}
                {!result.approval.slack_sent&&!result.approval.slack_error&&<p className="text-sm text-amber-600 mt-1">Slack not configured — approve via dashboard or API</p>}

                {result.approval.status==='pending'&&(<div className="flex gap-2 mt-3">
                  <button onClick={async()=>{try{const r=await fetch(`${API}/api/approvals/${result.approval.approval_id}/approve`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({note:'Approved via dashboard'})});const d=await r.json();if(d.status==='approved'){setResult(p=>({...p,approval:{...p.approval,status:'approved'},status:'approved'}))}}catch(e){console.error(e)}}}
                    className="px-4 py-2 bg-green-700 text-white rounded-lg text-xs font-medium hover:bg-green-800 transition">Approve & Send to Client</button>
                  <button onClick={async()=>{try{const r=await fetch(`${API}/api/approvals/${result.approval.approval_id}/reject`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({note:'Rejected via dashboard'})});const d=await r.json();if(d.status==='rejected'){setResult(p=>({...p,approval:{...p.approval,status:'rejected'},status:'rejected'}))}}catch(e){console.error(e)}}}
                    className="px-4 py-2 bg-white text-red-600 rounded-lg text-xs font-medium border border-red-200 hover:bg-red-50 transition">Reject</button>
                </div>)}
              </div>)}
            </div>)}

            {/* ── Research Results ── */}
            {rs&&!result?.error&&(<div className="space-y-4 fade-in">
              <div className="card p-6">
                <h2 className="card-header text-xl mb-2">Research Analysis</h2>
                <div className="flex gap-2 mb-3"><RiskBadge level={rs.confidence_level||"MEDIUM"}/><span className="text-xs text-[#999]">{rs.jurisdiction}</span>
                  {rs.rag_sources_used>0&&<span className="text-xs text-indigo-600">{rs.rag_sources_used} RAG sources</span>}</div>
                <p className="text-sm text-[#444] leading-relaxed whitespace-pre-wrap">{rs.legal_analysis}</p>
              </div>
              {rs.applicable_laws?.length>0&&(<div className="card p-6">
                <h3 className="card-header text-base text-blue-700 mb-2">Applicable Laws</h3>
                {rs.applicable_laws.map((l,i)=>(<div key={i} className="mb-2 bg-[#fafaf9] rounded p-2.5 border border-[#e8e5e0]">
                  <span className="text-sm font-medium text-[#333]">{l.law}</span>{l.section&&<span className="text-xs text-[#999] ml-2">{l.section}</span>}
                  <p className="text-xs text-[#666] mt-0.5">{l.relevance}</p></div>))}
              </div>)}
              {rs.key_findings?.length>0&&(<div className="card p-6">
                <h3 className="card-header text-base text-green-700 mb-2">Key Findings</h3>
                {rs.key_findings.map((f,i)=><p key={i} className="text-xs text-[#555] mb-1">&bull; {f}</p>)}
              </div>)}
              {rs.recommendations?.length>0&&(<div className="card p-6">
                <h3 className="card-header text-base text-indigo-700 mb-2">Recommendations</h3>
                {rs.recommendations.map((r,i)=><p key={i} className="text-xs text-[#555] mb-1">{i+1}. {r}</p>)}
              </div>)}
              {rs.disclaimer&&<p className="text-sm text-[#bbb] italic px-1">{rs.disclaimer}</p>}
            </div>)}

            {/* Audit Trail */}
            {result?.audit_trail?.length>0&&(<div className="card p-6"><AuditTrail trail={result.audit_trail}/></div>)}
            {result?.id&&(<div className="card p-3 flex justify-between text-sm text-[#999]">
              <span>Matter <code className="text-[#666] font-medium">{result.id}</code></span><span className="text-green-600">{result.status}</span></div>)}
          </div>
        </div>
      </div>

      {/* ─── Settings Modal ─── */}
      {showSettings&&(
        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={e=>{if(e.target===e.currentTarget)setShowSettings(false)}}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-xl max-h-[90vh] overflow-y-auto p-6 space-y-5">
            <div className="flex items-center justify-between">
              <h2 className="font-harvey text-xl text-[#1a1a1a]">Settings</h2>
              <button onClick={()=>setShowSettings(false)} className="text-[#999] hover:text-[#333] text-lg leading-none">✕</button>
            </div>

            {/* ─ Slack Workspaces ─ */}
            <div className="space-y-3">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <div className="w-6 h-6 rounded bg-[#4a154b] flex items-center justify-center flex-shrink-0">
                    <svg className="w-3.5 h-3.5 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M5.042 15.165a2.528 2.528 0 01-2.52 2.523A2.528 2.528 0 010 15.165a2.527 2.527 0 012.522-2.52h2.52v2.52zM6.313 15.165a2.527 2.527 0 012.521-2.52 2.527 2.527 0 012.521 2.52v6.313A2.528 2.528 0 018.834 24a2.528 2.528 0 01-2.521-2.522v-6.313zM8.834 5.042a2.528 2.528 0 01-2.521-2.52A2.528 2.528 0 018.834 0a2.527 2.527 0 012.521 2.522v2.52H8.834zM8.834 6.313a2.527 2.527 0 012.521 2.521 2.527 2.527 0 01-2.521 2.521H2.522A2.528 2.528 0 010 8.834a2.528 2.528 0 012.522-2.521h6.312zM18.956 8.834a2.528 2.528 0 012.522-2.521A2.528 2.528 0 0124 8.834a2.528 2.528 0 01-2.522 2.521h-2.522V8.834zM17.688 8.834a2.528 2.528 0 01-2.523 2.521 2.527 2.527 0 01-2.52-2.521V2.522A2.527 2.527 0 0115.165 0a2.528 2.528 0 012.523 2.522v6.312zM15.165 18.956a2.528 2.528 0 012.523 2.522A2.528 2.528 0 0115.165 24a2.527 2.527 0 01-2.52-2.522v-2.522h2.52zM15.165 17.688a2.527 2.527 0 01-2.52-2.523 2.526 2.526 0 012.52-2.52h6.313A2.527 2.527 0 0124 15.165a2.528 2.528 0 01-2.522 2.523h-6.313z"/></svg>
                  </div>
                  <h3 className="text-sm font-semibold text-[#1a1a1a]">Slack Workspaces / Approvers</h3>
                </div>
                <button onClick={()=>setShowSlackGuide(p=>!p)} className="text-xs px-2.5 py-1 rounded-lg border border-[#ddd8d0] text-[#666] hover:bg-[#f5f3f0]">
                  {showSlackGuide?"Hide guide":"How to set up →"}
                </button>
              </div>

              {/* Inline setup guide */}
              {showSlackGuide&&(
                <div className="bg-[#fafaf9] border border-[#e8e5e0] rounded-xl p-4 space-y-2.5 text-sm">
                  <p className="font-semibold text-[#333] text-xs">Create a new Slack workspace + webhook in 3 minutes:</p>
                  <div className="space-y-2">
                    {[
                      {n:"1",t:"Create workspace",d:"Go to slack.com/get-started → \"Create a new workspace\" → Enter your email → Name it e.g. \"Harveyy Legal\""},
                      {n:"2",t:"Create a Slack App",d:"Go to api.slack.com/apps → \"Create New App\" → \"From Scratch\" → Name it \"Harveyy AI\" → Select your workspace"},
                      {n:"3",t:"Enable webhooks",d:"In your app: \"Incoming Webhooks\" (left sidebar) → toggle ON → \"Add New Webhook to Workspace\" → Pick a channel (e.g. #approvals)"},
                      {n:"4",t:"Copy the URL",d:"Copy the webhook URL that looks like https://hooks.slack.com/services/T.../B.../... and paste it below"},
                    ].map(s=>(
                      <div key={s.n} className="flex gap-2.5">
                        <div className="w-5 h-5 rounded-full bg-[#4a154b] text-white text-xs flex items-center justify-center flex-shrink-0 font-bold">{s.n}</div>
                        <div><p className="font-medium text-[#333]">{s.t}</p><p className="text-[#777] mt-0.5 leading-relaxed">{s.d}</p></div>
                      </div>
                    ))}
                  </div>
                  <div className="pt-1 flex gap-2">
                    <a href="https://slack.com/get-started" target="_blank" className="px-3 py-1.5 rounded-lg bg-[#4a154b] text-white text-sm hover:opacity-90">Create Workspace →</a>
                    <a href="https://api.slack.com/apps" target="_blank" className="px-3 py-1.5 rounded-lg border border-[#ddd8d0] text-[#444] text-sm hover:bg-[#f5f3f0]">Create App →</a>
                  </div>
                </div>
              )}

              {/* Connected workspaces list */}
              {slackTargets.length>0&&(
                <div className="space-y-1.5">
                  <p className="text-xs text-[#999] uppercase font-semibold tracking-wider">Connected ({slackTargets.length})</p>
                  {slackTargets.map((t,i)=>(
                    <div key={i} className="flex items-center gap-2 px-3 py-2 rounded-lg bg-[#fafaf9] border border-[#e8e5e0]">
                      <div className="w-5 h-5 rounded bg-[#4a154b] flex items-center justify-center flex-shrink-0">
                        <span className="text-white text-[11px] font-bold">{t.name[0]}</span>
                      </div>
                      <div className="flex-1 min-w-0">
                        <p className="text-xs font-medium text-[#333]">{t.name}</p>
                        <p className="text-xs text-[#999] font-mono truncate">{t.webhook_preview}</p>
                      </div>
                      {t.role==="legal_team"&&<span className="text-xs px-1.5 py-0.5 bg-indigo-50 text-indigo-700 rounded-full">⚖️ Legal</span>}
                      {t.role==="executive"&&<span className="text-xs px-1.5 py-0.5 bg-amber-50 text-amber-700 rounded-full">👤 Exec</span>}
                      <span className="text-xs px-1.5 py-0.5 bg-green-50 text-green-700 rounded-full">● live</span>
                      {t.name!=="Primary"&&<button onClick={()=>removeTarget(t.name)} className="text-[#ccc] hover:text-red-400 text-xs ml-1">✕</button>}
                    </div>
                  ))}
                </div>
              )}

              {/* Add new target */}
              <div className="rounded-xl border border-[#e8e5e0] p-4 space-y-2.5">
                <p className="text-xs font-semibold text-[#333]">Add workspace / approver</p>
                <input value={slackName} onChange={e=>setSlackName(e.target.value)}
                  className="w-full rounded-lg px-3 py-2 text-sm border border-[#ddd8d0] focus:border-[#4a154b] focus:outline-none"
                  placeholder="Name — e.g. Legal Team or Mr. Peter"/>
                <select value={slackRole} onChange={e=>setSlackRole(e.target.value)}
                  className="w-full rounded-lg px-3 py-2 text-sm border border-[#ddd8d0] focus:border-[#4a154b] focus:outline-none bg-white">
                  <option value="legal_team">⚖️ Legal Team — receives technical QA memo first</option>
                  <option value="executive">👤 Executive (Mr. Peter) — receives plain-English summary</option>
                  <option value="general">📢 General — receives all notifications</option>
                </select>
                <input value={slackWebhook} onChange={e=>setSlackWebhook(e.target.value)}
                  className="w-full rounded-lg px-3 py-2 text-sm border border-[#ddd8d0] focus:border-[#4a154b] focus:outline-none font-mono"
                  placeholder="https://hooks.slack.com/services/T.../B.../..."/>
                <div className="flex gap-2">
                  <button onClick={addSlackTarget} disabled={settingsSaving||!slackWebhook.trim()||!slackName.trim()}
                    className="flex-1 py-2 rounded-lg text-xs font-medium bg-[#4a154b] text-white hover:opacity-90 disabled:opacity-40 transition">
                    {settingsSaving?"Saving...":"Add"}
                  </button>
                  <button onClick={testWebhook} disabled={slackTesting||!slackWebhook.trim()}
                    className="px-3 py-2 rounded-lg text-xs font-medium border border-[#ddd8d0] text-[#555] hover:bg-[#f5f3f0] disabled:opacity-40 transition">
                    {slackTesting?"Sending...":"Send Test"}
                  </button>
                </div>
                {slackTestMsg&&<p className={`text-sm rounded px-2 py-1 ${slackTestMsg.startsWith("Error")?"bg-red-50 text-red-600":"bg-green-50 text-green-700"}`}>{slackTestMsg}</p>}
              </div>
            </div>

            <div className="border-t border-[#f0ede8] pt-4 text-sm text-[#bbb]">
              <p>OpenAI API: <span className={slackStatus?.openai_configured?"text-green-600":"text-red-500"}>{slackStatus?.openai_configured?"✓ Configured":"✗ Missing — set OPENAI_API_KEY in .env"}</span></p>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ───────────── APP ROOT ───────────── */
function App(){
  const autoSkip=window.location.hash.startsWith("#matter=")||window.location.hash.startsWith("#approve=");
  const[page,setPage]=useState(autoSkip?"dashboard":"landing");
  if(page==="landing")return <LandingPage onEnter={()=>setPage("dashboard")}/>;
  return <Dashboard onBack={()=>setPage("landing")}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
