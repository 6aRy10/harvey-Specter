/* ───────────── SHARED COMPONENTS ───────────── */
function RiskBadge({level}){
  const c={HIGH:"bg-red-500/20 text-red-400 border-red-500/40",MEDIUM:"bg-amber-500/20 text-amber-400 border-amber-500/40",LOW:"bg-blue-500/20 text-blue-400 border-blue-500/40",INFO:"bg-gray-500/20 text-gray-400 border-gray-500/40"};
  return <span className={`px-2 py-0.5 rounded text-xs font-semibold border ${c[level]||c.INFO}`}>{level}</span>;
}

function ScoreRing({score,size=80}){
  const pct=score*10,color=score>=7?"#ef4444":score>=4?"#f59e0b":"#22c55e",r=32,circ=2*Math.PI*r;
  return(
    <div className="relative" style={{width:size,height:size}}>
      <svg viewBox="0 0 80 80" className="w-full h-full -rotate-90">
        <circle cx="40" cy="40" r={r} fill="none" stroke="#1a1a2a" strokeWidth="6"/>
        <circle cx="40" cy="40" r={r} fill="none" stroke={color} strokeWidth="6" strokeDasharray={circ} strokeDashoffset={circ*(1-pct/100)} strokeLinecap="round" style={{transition:'stroke-dashoffset 1s ease'}}/>
      </svg>
      <div className="absolute inset-0 flex items-center justify-center"><span className="text-xl font-bold">{score}</span></div>
    </div>
  );
}

function ContractViewer({text,clauses=[]}){
  if(!text)return null;
  let html=text.replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const sorted=[...clauses].sort((a,b)=>(b.original_text||"").length-(a.original_text||"").length);
  sorted.forEach(cl=>{
    if(!cl.original_text)return;
    const esc=cl.original_text.replace(/[.*+?^${}()|[\]\\]/g,'\\$&').replace(/\s+/g,'\\s+');
    try{const re=new RegExp(`(${esc.substring(0,150)})`,"gi");const l=(cl.risk_level||"LOW").toLowerCase();
    html=html.replace(re,`<span class="highlight-${l}" title="${cl.clause_type}: ${(cl.explanation||'').substring(0,120)}">$1</span>`);}catch(e){}
  });
  return <pre className="whitespace-pre-wrap text-sm text-gray-300 leading-relaxed font-mono bg-[#0a0a14] rounded-lg p-5 max-h-[500px] overflow-auto border border-white/5" dangerouslySetInnerHTML={{__html:html}}/>;
}

function AgentDot({active,name}){
  return(<div className="flex items-center gap-1.5"><div className={`w-1.5 h-1.5 rounded-full ${active?"bg-green-400 agent-active":"bg-gray-700"}`}/><span className="text-[11px] text-gray-500">{name}</span></div>);
}

function AuditTrail({trail=[]}){
  if(!trail.length)return null;
  return(<div className="space-y-1"><h3 className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Audit Trail</h3>
    {trail.map((e,i)=>(<div key={i} className="flex gap-3 text-xs slide-in" style={{animationDelay:`${i*40}ms`}}>
      <span className="text-gray-700 w-14 shrink-0 font-mono">{e.timestamp?.split("T")[1]?.substring(0,8)}</span>
      <span className="text-white/60 w-24 shrink-0 font-medium">{e.agent}</span>
      <span className="text-gray-500">{e.action}{e.details?` — ${e.details}`:""}</span>
    </div>))}</div>);
}

      try{
        const form=new FormData();form.append("file",f);
        const ctrl=new AbortController();const t=setTimeout(()=>ctrl.abort(),60000);
        const r=await fetch(`${API}/api/extract-pdf`,{method:"POST",body:form,signal:ctrl.signal});
        clearTimeout(t);
        const d=await r.json();
        setChatMsgs(p=>p.filter(m=>!m.loading));
        if(d.error==="scanned_pdf"){
          setChatMsgs(p=>[...p,{role:"ai",text:`⚠️ "${f.name}" is a scanned/image PDF — text can't be extracted automatically. Please export it as .txt or copy-paste the contract text into a .txt file and upload that instead.`,ts:new Date().toLocaleTimeString()}]);
        } else if(d.text){
          setContractText(d.text);
          const method=d.method==="ocr"?" (OCR — AI vision)":"";
          setChatMsgs(p=>[...p,{role:"ai",text:"✅ Extracted "+d.pages+" pages ("+d.chars.toLocaleString()+" chars) from \""+f.name+"\""+method+". Ready to review.",ts:new Date().toLocaleTimeString()}]);
        }
      }catch(err){
        setChatMsgs(p=>[...p.filter(m=>!m.loading),{role:"ai",text:"Upload error: "+err.message,ts:new Date().toLocaleTimeString()}]);
      }
    } else {
      const r=new FileReader();r.onload=ev=>setContractText(ev.target.result);r.readAsText(f);
    }
  };

  const loadBMW=async()=>{try{const r=await fetch('demo/bmw_dpa_contract.txt');if(r.ok){setContractText(await r.text())}else{setContractText("Failed to load BMW DPA")}}catch(e){setContractText("Failed to load: "+e.message)}};

  // Chat send — multilingual with citations
  const sendChat=async()=>{
    if(!chatInput.trim())return;
    const msg=chatInput.trim();
    setChatInput("");
    const userMsg={role:"user",text:msg,ts:new Date().toLocaleTimeString()};
    setChatMsgs(p=>[...p,userMsg]);
    setChatMsgs(p=>[...p,{role:"ai",text:"Researching...",ts:new Date().toLocaleTimeString(),loading:true}]);
    try{
      const body={message:msg,context:intakeContext()};
      if(contractText.trim().length>50)body.contract_text=contractText;
      const r=await fetch(`${API}/api/chat`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
      const d=await r.json();
      if(d.full_result&&contractText.trim().length>50)setResult(d.full_result);
      const lang=d.detected_language||"en";
      const langLabel={de:"🇩🇪 Deutsch",hi:"🇮🇳 हिन्दी",en:"🇬🇧 English"}[lang]||"";
      setChatMsgs(p=>[...p.filter(m=>!m.loading),{role:"ai",text:d.reply||"No response.",ts:new Date().toLocaleTimeString(),lang:langLabel,sources:d.sources||[]}]);
    }catch(e){setChatMsgs(p=>[...p.filter(m=>!m.loading),{role:"ai",text:"Error: "+e.message,ts:new Date().toLocaleTimeString()}]);}
  };

  // Drag and drop
  const handleDrop=(e)=>{e.preventDefault();setDragOver(false);
    const files=Array.from(e.dataTransfer.files);
    if(files.length>0){
      const f=files[0];
      const reader=new FileReader();reader.onload=ev=>{
        setContractText(ev.target.result);
        const newItem={id:"t"+Date.now(),name:f.name,status:"needs_review",priority:"high",assignee:"Ayush",uploaded:"Just now",type:f.name.toLowerCase().includes("nda")?"NDA":f.name.toLowerCase().includes("dpa")?"DPA":"Contract"};
        setTriageList(p=>[newItem,...p]);
        setChatMsgs(p=>[...p,{role:"ai",text:`Uploaded "${f.name}" (${(f.size/1024).toFixed(1)}KB). I'll ask a few questions before reviewing.`,ts:new Date().toLocaleTimeString()}]);
      };reader.readAsText(f);
    }
  };

  // Smart intake: detect contract type and generate relevant questions
  const detectAndAsk=(text)=>{
    if(!text||text.trim().length<50){setIntakeQs(null);setIntakeStep(0);return;}
    const t=text.toLowerCase();
    let type="general";
    if(t.includes("data processing")||t.includes("gdpr")||t.includes("personal data"))type="dpa";
    else if(t.includes("non-disclosure")||t.includes("confidential information")||t.includes("nda"))type="nda";
    else if(t.includes("employment")||t.includes("arbeitsvertrag")||t.includes("employee"))type="employment";
    else if(t.includes("saas")||t.includes("subscription")||t.includes("service level"))type="saas";
    else if(t.includes("consulting")||t.includes("consultant")||t.includes("advisory"))type="consulting";
    else if(t.includes("license")||t.includes("intellectual property")||t.includes("royalt"))type="license";
    else if(t.includes("lease")||t.includes("tenant")||t.includes("landlord"))type="lease";
    else if(t.includes("merger")||t.includes("acquisition")||t.includes("share purchase"))type="ma";

    const qMap={
      dpa:[
        {id:"goal",question:"What is your objective with this DPA review?",type:"select",options:["Ensure GDPR compliance","Negotiate better terms for our side","Check for missing clauses","Full risk assessment","Preparing for audit"]},
        {id:"role",question:"Which party are you representing?",type:"select",options:["Data Controller (Company)","Data Processor","Both / Joint Controller"]},
        {id:"deadline",question:"By when do you need to send this back?",type:"text",placeholder:"e.g., Friday EOD, 48 hours, urgent"},
        {id:"transfers",question:"Will personal data be transferred outside the EU/EEA?",type:"select",options:["Yes","No","Not sure"]},
        {id:"bestcase",question:"What's your best-case outcome?",type:"text",placeholder:"e.g., Partner signs as-is with minor tweaks"},
        {id:"worstcase",question:"What's the worst-case scenario you want to avoid?",type:"text",placeholder:"e.g., Data breach liability falls entirely on us"},
      ],
      nda:[
        {id:"goal",question:"What are you looking for from this review?",type:"select",options:["Check if safe to sign","Negotiate better terms","Identify risky clauses","Full risk assessment"]},
        {id:"side",question:"Which side are you on?",type:"select",options:["Disclosing Party","Receiving Party","Mutual"]},
        {id:"deadline",question:"When do you need this back?",type:"text",placeholder:"e.g., Tomorrow morning, 2 hours"},
        {id:"concern",question:"Any specific concerns?",type:"select",options:["Non-compete is too broad","Duration seems excessive","IP assignment clause","No concerns yet — just review"]},
        {id:"bestcase",question:"Best-case outcome?",type:"text",placeholder:"e.g., Sign with minor amendments"},
        {id:"worstcase",question:"Worst-case scenario to avoid?",type:"text",placeholder:"e.g., Losing IP rights or getting locked into non-compete"},
      ],
      employment:[
        {id:"goal",question:"What's your goal with this employment contract?",type:"select",options:["Review before signing","Check local law compliance","Negotiate better terms","Termination clause review"]},
        {id:"role",question:"Are you the employer or employee?",type:"select",options:["Employer","Employee"]},
        {id:"deadline",question:"By when do you have to send it back?",type:"text",placeholder:"e.g., Start date is next Monday"},
        {id:"jurisdiction",question:"Which jurisdiction applies?",type:"text",placeholder:"e.g., Germany, California, UK"},
        {id:"bestcase",question:"Best-case outcome?",type:"text",placeholder:"e.g., Fair terms for both sides"},
        {id:"worstcase",question:"Worst-case to avoid?",type:"text",placeholder:"e.g., Unfair termination clause, excessive non-compete"},
      ],
      saas:[
        {id:"goal",question:"What are you reviewing this SaaS agreement for?",type:"multiselect",options:["Vendor due diligence","Negotiate pricing/terms","Data security review","Full legal review"]},
        {id:"role",question:"Are you the provider or customer?",type:"select",options:["SaaS Provider","Customer/Buyer"]},
        {id:"deadline",question:"When is the contract deadline?",type:"text",placeholder:"e.g., Renewal is in 2 weeks"},
        {id:"concern",question:"Key concern?",type:"select",options:["SLA guarantees","Data ownership","Auto-renewal trap","Liability caps"]},
        {id:"bestcase",question:"Best-case outcome?",type:"text",placeholder:"e.g., Lock in favorable SLA"},
      ],
      consulting:[
        {id:"goal",question:"What do you need from this consulting agreement review?",type:"multiselect",options:["Protect our IP","Ensure deliverables are clear","Check payment terms","Full risk review"]},
        {id:"role",question:"Are you the consultant or the client?",type:"select",options:["Consultant","Client"]},
        {id:"deadline",question:"When do you need it back?",type:"text",placeholder:"e.g., Before kickoff meeting Thursday"},
        {id:"bestcase",question:"Best-case outcome?",type:"text",placeholder:"e.g., Clear scope, IP stays with us"},
        {id:"worstcase",question:"Worst-case to avoid?",type:"text",placeholder:"e.g., Scope creep with no extra pay"},
      ],
      general:[
        {id:"goal",question:"What are you looking for from this review?",type:"multiselect",options:["Full risk assessment","Check if safe to sign","Identify missing clauses","Negotiate better terms","Compliance check"]},
        {id:"deadline",question:"When do you need this back?",type:"text",placeholder:"e.g., End of day, 48 hours, ASAP"},
        {id:"bestcase",question:"What's your best-case outcome?",type:"text",placeholder:"e.g., Sign with minor changes"},
        {id:"worstcase",question:"What's the worst-case scenario to avoid?",type:"text",placeholder:"e.g., Unlimited liability exposure"},
      ],
      license:[
        {id:"goal",question:"What's your objective?",type:"select",options:["Protect our IP","Review royalty terms","Check exclusivity scope","Full risk review"]},
        {id:"role",question:"Are you the licensor or licensee?",type:"select",options:["Licensor","Licensee"]},
        {id:"deadline",question:"When is the signing deadline?",type:"text",placeholder:"e.g., Next week"},
        {id:"bestcase",question:"Best-case outcome?",type:"text",placeholder:"e.g., Non-exclusive with fair royalties"},
        {id:"worstcase",question:"Worst-case to avoid?",type:"text",placeholder:"e.g., Losing control of IP"},
      ],
      lease:[
        {id:"goal",question:"What do you need?",type:"select",options:["Review before signing","Check tenant rights","Negotiate rent terms","Full risk review"]},
        {id:"role",question:"Are you the landlord or tenant?",type:"select",options:["Landlord","Tenant"]},
        {id:"deadline",question:"When is the move-in / signing date?",type:"text",placeholder:"e.g., Lease starts June 1"},
        {id:"bestcase",question:"Best-case outcome?",type:"text",placeholder:"e.g., Reasonable break clause"},
      ],
      ma:[
        {id:"goal",question:"What are you looking for?",type:"select",options:["Due diligence review","Valuation check","Risk identification","Regulatory compliance"]},
        {id:"role",question:"Which side?",type:"select",options:["Acquirer / Buyer","Target / Seller","Advisor"]},
        {id:"deadline",question:"When is the deal deadline?",type:"text",placeholder:"e.g., Closing in 3 weeks"},
        {id:"bestcase",question:"Best-case outcome?",type:"text",placeholder:"e.g., Clean deal, no hidden liabilities"},
        {id:"worstcase",question:"Worst-case to avoid?",type:"text",placeholder:"e.g., Undisclosed litigation or debt"},
      ],
    };
    const questions=(qMap[type]||qMap.general).map(q=>({...q,answer:""}));
    setIntakeQs(questions);
    setIntakeStep(1);
    return type;
  };

  // When contract text changes significantly, trigger intake
  const prevLen=useRef(0);
  useEffect(()=>{
    const len=contractText.trim().length;
    if(len>100&&prevLen.current<100){detectAndAsk(contractText);}
    if(len<50&&prevLen.current>=50){setIntakeQs(null);setIntakeStep(0);}
    prevLen.current=len;
  },[contractText]);

  const updateIntakeAnswer=(id,val)=>{setIntakeQs(prev=>prev.map(q=>q.id===id?{...q,answer:val}:q));};
  const intakeContext=()=>{if(!intakeQs)return{};const ctx={};intakeQs.forEach(q=>{const a=q.answer;if(!a||a===""||( Array.isArray(a)&&a.length===0))return;ctx[q.id]=Array.isArray(a)?a.join(", "):a;});return ctx;};

  const searchRAG=async()=>{if(!ragQuery.trim())return;setLoading(true);
    try{const r=await fetch(`${API}/api/rag/search`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({query:ragQuery,n_results:5})});setRagResults(await r.json());}
    catch(e){setRagResults({error:e.message});}setLoading(false);};

  const rv=result?.agent_results?.contract_review||(result?.agent==="contract_review"?result:null);
  const dr=result?.agent_results?.drafting||(result?.agent==="drafting"?result:null);
  const rs=result?.agent_results?.legal_research||(result?.agent==="legal_research"?result:null);
  const qa=result?.agent_results?.qa_review||null;

  const urgentCount=triageCases.filter(c=>c.hoursLeft<=24).length;
  const tabs=[{id:"review",label:"Contract Review",ic:"M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"},
    {id:"triage",label:`Triage${urgentCount?` (${urgentCount})`:``}`,ic:"M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"},
    {id:"draft",label:"Draft Contract",ic:"M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"},
    {id:"research",label:"Legal Research",ic:"M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"},
    {id:"matter",label:"Full Matter",ic:"M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"},
    {id:"rag",label:"Q&A",ic:"M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"},
    {id:"kb",label:"Knowledge Base",ic:"M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"}];

  return(
    <div className="min-h-screen dash-light">
      {/* Premium Header */}
      <header className="border-b border-[#e8e5e0] bg-white/90 backdrop-blur-xl sticky top-0 z-50">
        <div className="max-w-[1400px] mx-auto px-6 py-3.5 flex items-center justify-between">
          <div className="flex items-center gap-6">
            <button onClick={onBack} className="font-harvey text-xl text-[#1a1a1a] hover:opacity-60 transition">Harveyy</button>
            <div className="h-5 w-px bg-[#e0ddd8]"/>
            <div className="flex gap-1">
              {tabs.map(t=>(
                <button key={t.id} onClick={()=>{setTab(t.id);setResult(null);}}
                  className={`flex items-center gap-1.5 px-3.5 py-2 rounded-lg text-xs font-medium transition ${tab===t.id?"bg-[#1a1a1a] text-white shadow-sm":"text-[#888] hover:text-[#1a1a1a] hover:bg-[#f0ede8]"}`}>
                  <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.5"><path strokeLinecap="round" strokeLinejoin="round" d={t.ic}/></svg>
                  <span className="hidden md:inline">{t.label}</span>
                </button>
              ))}
            </div>
          </div>
          <div className="flex items-center gap-3">
            <AgentDot active={loading} name="Intake"/>
            <AgentDot active={loading} name="Review"/>
            <AgentDot active={loading} name="Research"/>
            <AgentDot active={loading} name="Drafting"/>
          </div>
        </div>
      </header>

      <div className="max-w-[1400px] mx-auto px-6 py-8">
        <div className="grid grid-cols-1 lg:grid-cols-5 gap-6">
          {/* ─── LEFT: INPUT (2 cols) ─── */}
          <div className="lg:col-span-2 space-y-4">

            {tab==="review"&&(<div className="space-y-4">

              {/* ── Drag & Drop Upload Zone ── */}
              {!contractText.trim()&&(<div className={`card p-8 text-center transition-all ${dragOver?'border-2 border-dashed border-indigo-400 bg-indigo-50/50':'border border-dashed border-[#d5d0c8]'}`}
                onDragOver={e=>{e.preventDefault();setDragOver(true)}} onDragLeave={()=>setDragOver(false)} onDrop={handleDrop}>
                <div className="flex flex-col items-center gap-3">
                  <div className="w-12 h-12 rounded-xl bg-[#f5f3f0] flex items-center justify-center">
                    <svg className="w-6 h-6 text-[#999]" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.5"><path strokeLinecap="round" strokeLinejoin="round" d="M9 8.25H7.5a2.25 2.25 0 00-2.25 2.25v9a2.25 2.25 0 002.25 2.25h9a2.25 2.25 0 002.25-2.25v-9a2.25 2.25 0 00-2.25-2.25H15m0-3l-3-3m0 0l-3 3m3-3v11.25"/></svg>
                  </div>
                  <p className="font-harvey text-lg text-[#333]">Drag and drop your files</p>
                  <button onClick={()=>fileRef.current?.click()} className="px-5 py-2 bg-[#1a1a1a] text-white rounded-lg text-sm font-medium hover:bg-[#333] transition flex items-center gap-2">
                    <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                    Upload</button>
                  <input ref={fileRef} type="file" accept=".txt,.md,.pdf,.docx,.csv,.json" className="hidden" onChange={handleFile}/>
                  <p className="text-xs text-[#bbb]">Or choose from</p>
                  <div className="flex flex-wrap gap-2 justify-center">
                    <button onClick={loadSample} className="px-3 py-1.5 rounded-lg text-xs border border-[#e0ddd8] bg-white hover:bg-[#fafaf9] transition flex items-center gap-1.5"><span className="text-blue-500">&#9679;</span> Sample NDA</button>
                    <button onClick={loadBMW} className="px-3 py-1.5 rounded-lg text-xs border border-[#e0ddd8] bg-white hover:bg-[#fafaf9] transition flex items-center gap-1.5"><span className="text-green-500">&#9679;</span> BMW DPA</button>
                    <button className="px-3 py-1.5 rounded-lg text-xs border border-[#e0ddd8] bg-white hover:bg-[#fafaf9] transition flex items-center gap-1.5 opacity-50"><span className="text-orange-400">&#9679;</span> SharePoint</button>
                    <button className="px-3 py-1.5 rounded-lg text-xs border border-[#e0ddd8] bg-white hover:bg-[#fafaf9] transition flex items-center gap-1.5 opacity-50"><span className="text-yellow-500">&#9679;</span> Google Drive</button>
                  </div>
                </div>
              </div>)}

              {/* ── Contract loaded: show preview + intake ── */}
              {contractText.trim().length>0&&(<div className="card p-4 space-y-3">
                <div className="flex items-center justify-between">
                  <div className="flex items-center gap-2">
                    <div className="w-8 h-8 rounded-lg bg-indigo-100 flex items-center justify-center"><svg className="w-4 h-4 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg></div>
                    <div><p className="text-sm font-medium text-[#333]">Contract loaded</p><p className="text-[11px] text-[#999]">{contractText.length.toLocaleString()} characters</p></div>
                  </div>
                  <button onClick={()=>{setContractText("");setIntakeQs(null);setIntakeStep(0);setChatMsgs([]);setResult(null)}} className="text-xs text-red-500 hover:text-red-700 transition">Remove</button>
                </div>
                <details className="text-xs">
                  <summary className="text-[#999] cursor-pointer hover:text-[#666]">Preview contract text</summary>
                  <pre className="mt-2 max-h-40 overflow-auto text-[11px] text-[#666] bg-[#fafaf9] rounded-lg p-3 font-mono whitespace-pre-wrap">{contractText.slice(0,1500)}{contractText.length>1500?"...":""}</pre>
                </details>
              </div>)}

              {/* ── Smart Intake Questionnaire ── */}
              {intakeStep===1&&intakeQs&&(<div className="card p-5 space-y-3 slide-in border-l-4 border-l-indigo-400">
                <div className="flex items-center gap-2">
                  <div className="w-6 h-6 rounded-full bg-indigo-100 flex items-center justify-center"><svg className="w-3.5 h-3.5 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
                  <div><h3 className="text-sm font-semibold text-[#333]">Before we review...</h3><p className="text-[10px] text-[#999]">Help the AI focus. Skip any you don't need.</p></div>
                </div>
                <div className="space-y-2.5">
                  {intakeQs.map((q,i)=>(<div key={q.id} className="slide-in" style={{animationDelay:`${i*50}ms`}}>
                    <label className="text-xs font-medium text-[#444] block mb-1">{q.question}</label>
                    {q.type==="multiselect"?(
                      <div className="flex flex-wrap gap-1">
                        {q.options.map(o=>{const sel=(Array.isArray(q.answer)?q.answer:[]).includes(o);return(<button key={o} onClick={()=>{const cur=Array.isArray(q.answer)?q.answer:[];updateIntakeAnswer(q.id,sel?cur.filter(x=>x!==o):[...cur,o]);}}
                          className={`px-2.5 py-1 rounded text-[11px] transition border ${sel?'bg-indigo-600 text-white border-indigo-600':'bg-white text-[#555] border-[#e0ddd8] hover:border-indigo-300'}`}>{o}</button>);})}
                      </div>
                    ):q.type==="select"?(
                      <div className="flex flex-wrap gap-1">
                        {q.options.map(o=>(<button key={o} onClick={()=>updateIntakeAnswer(q.id,o)}
                          className={`px-2.5 py-1 rounded text-[11px] transition border ${q.answer===o?'bg-indigo-600 text-white border-indigo-600':'bg-white text-[#555] border-[#e0ddd8] hover:border-indigo-300'}`}>{o}</button>))}
                      </div>
                    ):(
                      <input value={q.answer} onChange={e=>updateIntakeAnswer(q.id,e.target.value)}
                        className="w-full rounded-lg p-2 text-xs border border-[#e0ddd8]" placeholder={q.placeholder||""}/>
                    )}
                  </div>))}
                </div>
                <div className="flex gap-2">
                  <button onClick={()=>{setIntakeStep(2);callAPI("/api/review",{contract_text:contractText,context:intakeContext()})}} disabled={loading}
                    className="btn-primary flex-1 py-2.5 rounded-lg text-xs transition">
                    {loading?"Analyzing...":"Analyze Contract"}</button>
                  <button onClick={()=>{setIntakeStep(2);callAPI("/api/review",{contract_text:contractText})}} disabled={loading}
                    className="btn-outline px-3 py-2.5 rounded-lg text-[11px] transition">Skip</button>
                </div>
              </div>)}

              {/* Analyze button when intake done */}
              {intakeStep===2&&contractText.trim().length>0&&!loading&&(
                <button onClick={()=>callAPI("/api/review",{contract_text:contractText,context:intakeContext()})} disabled={loading}
                  className="btn-primary w-full py-2.5 rounded-lg text-xs transition">Re-analyze Contract</button>
              )}

              {/* ── Triage List ── */}
              <div className="card p-4">
                <div className="flex items-center justify-between mb-3">
                  <h3 className="text-xs font-semibold text-[#333] uppercase tracking-wider">Contract Queue</h3>

                {(kbResults.files||[]).map((f,i)=>(<p key={i} className="text-[11px] text-[#888] mt-0.5">{f.name}: {f.chunks||0} chunks {f.error?`(${f.error})`:''}</p>))}
              </div>)}
              {kbResults?.error&&(<div className="bg-red-50 border border-red-200 rounded-lg p-4"><p className="text-xs text-red-600">{kbResults.error}</p></div>)}
            </div>)}
          </div>

          {/* ─── RIGHT: RESULTS (3 cols) ─── */}
          <div className="lg:col-span-3 space-y-4">
            {loading&&(<div className="card p-10 text-center">
              <div className="inline-block w-6 h-6 border-2 border-[#1a1a1a] border-t-transparent rounded-full animate-spin mb-3"/>
              <p className="text-[#888] text-sm">Agents are processing your request...</p>
              <p className="text-[11px] text-[#bbb] mt-1">Large contracts are auto-truncated to 15,000 chars for speed.</p>
            </div>)}

            {!loading&&!result&&(<div className="card p-10 text-center">
              <div className="text-[#ccc] text-4xl mb-3">&#9878;</div>
              <p className="text-[#888] text-sm">Submit a request to see results here.</p>
              <p className="text-[#bbb] text-xs mt-1">Your AI legal team is standing by.</p>
            </div>)}

            {result?.error&&(<div className="bg-red-50 border border-red-200 rounded-xl p-5">
              <h3 className="text-red-700 font-semibold text-sm mb-1">Connection Error</h3>
              <p className="text-xs text-red-500">{result.error}</p>
              <p className="text-[11px] text-[#999] mt-2">Start the backend: <code className="text-red-400">python -m uvicorn backend.main:app --reload --port 8000</code></p>
            </div>)}

            {/* ── Intake Brief (if provided) ── */}
            {result?.intake_brief&&!result?.error&&(<div className="card p-4 border-l-4 border-l-indigo-400 slide-in">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] px-2 py-0.5 bg-indigo-50 text-indigo-600 rounded-full font-medium">Intake Context</span>
              </div>
              <div className="flex flex-wrap gap-x-4 gap-y-1">
                {Object.entries(result.intake_brief).map(([k,v])=>v?(<div key={k} className="text-xs"><span className="text-[#999] capitalize">{k.replace(/([A-Z])/g,' $1')}:</span> <span className="text-[#555] font-medium">{v}</span></div>):null)}
              </div>
            </div>)}

            {/* ── Contract Review Results ── */}
            {rv&&!result?.error&&(<div className="space-y-4 fade-in">
              {/* Summary Card */}
              <div className="card p-6">
                <div className="flex items-start justify-between mb-4">
                  <div><h2 className="card-header text-xl">Review Results</h2>
                    <p className="text-xs text-[#999] mt-1">{rv.contract_type} &middot; {(rv.parties_identified||[]).join(" & ")}</p></div>
                  <ScoreRing score={rv.overall_risk_score||0}/>
                </div>
                <div className="flex gap-2 mb-3"><RiskBadge level={rv.risk_level||"MEDIUM"}/><span className="text-[11px] text-[#999]">{(rv.clauses_found||[]).length} clauses flagged</span></div>
                <p className="text-sm text-[#555] leading-relaxed">{rv.executive_summary}</p>
              </div>

              {/* Firm Standards Compliance Card */}
              <div className="card p-5 border-l-4 border-l-amber-400 bg-amber-50/50">
                <div className="flex items-center gap-2 mb-2">
                  <svg className="w-4 h-4 text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                  <h3 className="text-sm font-semibold text-amber-800">Firm Standards Compliance</h3>
                </div>
                <p className="text-xs text-amber-700 leading-relaxed">Identifies risk against firm standards by automatically flagging deviations from your playbook and gold-standard requirements. This contract has been checked against your firm's risk matrix and approved clause library.</p>
                <div className="flex gap-2 mt-2">
                  <span className="text-[10px] px-2 py-0.5 bg-amber-100 text-amber-700 rounded-full">Playbook Check: {(rv.risk_level==="LOW"||rv.risk_level==="MEDIUM")?"Pass":"Flagged"}</span>
                  <span className="text-[10px] px-2 py-0.5 bg-amber-100 text-amber-700 rounded-full">{(rv.missing_protections?.length||0)} missing standards</span>
                </div>
              </div>

              {/* Annotated Contract */}
              {contractText&&(<div className="card p-6">
                <div className="flex items-center gap-2 mb-3">
                  <h3 className="card-header text-base">Annotated Contract</h3>
                  <span className="text-[10px] px-2 py-0.5 bg-[#f5f3f0] rounded text-[#999]">Hover highlighted text for details</span>
                </div>
                <ContractViewer text={contractText} clauses={rv.clauses_found||[]}/>
              </div>)}

              {/* Flagged Clauses */}
              <div className="card p-6 space-y-2">
                <h3 className="card-header text-base mb-1">Flagged Clauses</h3>
                {(rv.clauses_found||[]).map((cl,i)=>(<div key={i} className="bg-[#fafaf9] rounded-lg p-3 border border-[#e8e5e0] slide-in" style={{animationDelay:`${i*60}ms`}}>
                  <div className="flex items-center gap-2 mb-1.5"><RiskBadge level={cl.risk_level}/><span className="text-sm font-medium text-[#333]">{cl.clause_type}</span><span className="text-[11px] text-[#bbb] ml-auto">{cl.section}</span></div>
                  <p className="text-xs text-[#666] mb-1.5">{cl.explanation}</p>
                  {cl.suggestion&&<p className="text-xs text-blue-600">Suggestion: {cl.suggestion}</p>}
                  {cl.suggested_replacement&&(<details className="mt-2"><summary className="text-[11px] text-green-700 cursor-pointer hover:text-green-800">View replacement text</summary>
                    <pre className="text-[11px] text-green-800 bg-green-50 rounded p-2 mt-1 whitespace-pre-wrap border border-green-200">{cl.suggested_replacement}</pre></details>)}
                </div>))}
              </div>

              {/* Errors Found */}
              {rv.errors_found?.length>0&&(<div className="card border-red-200 p-6 space-y-2">
                <h3 className="card-header text-base text-red-700">Errors & Issues</h3>
                {rv.errors_found.map((err,i)=>(<div key={i} className="bg-red-50 rounded-lg p-3 border border-red-200 slide-in">
                  <div className="flex items-center gap-2 mb-1"><RiskBadge level={err.severity||"MEDIUM"}/><span className="text-xs text-red-700 font-medium">{err.type}</span></div>
                  <p className="text-xs text-[#666]">{err.description}</p>
                  {err.original_text&&<p className="text-[11px] text-[#999] mt-1 italic">"{err.original_text.substring(0,120)}"</p>}
                </div>))}
              </div>)}

              {rv.missing_protections?.length>0&&(<div className="card border-amber-200 p-6 space-y-2">
                <h3 className="card-header text-base text-amber-700">Missing Protections</h3>
                {rv.missing_protections.map((mp,i)=>(<div key={i} className="bg-amber-50 rounded-lg p-3 border border-amber-200">
                  <div className="flex items-center gap-2 mb-1"><RiskBadge level={mp.importance}/><span className="text-sm text-[#333]">{mp.clause_type}</span></div>
                  <p className="text-xs text-[#666]">{mp.recommendation}</p>
                  {mp.suggested_clause&&<pre className="text-[11px] text-amber-800 bg-amber-50 rounded p-2 mt-2 whitespace-pre-wrap border border-amber-200">{mp.suggested_clause}</pre>}
                </div>))}
              </div>)}

              {rv.top_recommendations?.length>0&&(<div className="card p-6">
                <h3 className="card-header text-base text-green-700 mb-2">Recommendations</h3>
                {rv.top_recommendations.map((r,i)=>(<p key={i} className="text-sm text-[#555] mb-1"><span className="text-green-600 mr-2 font-medium">{i+1}.</span>{r}</p>))}
              </div>)}

              {rv.gdpr_compliance_notes&&(<div className="card p-5">
                <h3 className="text-xs font-semibold text-blue-600 mb-1">GDPR Notes</h3>
                <p className="text-xs text-[#666]">{rv.gdpr_compliance_notes}</p>
              </div>)}

              {/* Auto-Research by Legal Research Agent */}
              {result?.auto_research?.length>0&&(<div className="card p-6 space-y-3">
                <div className="flex items-center gap-2 mb-1">
                  <div className="w-6 h-6 rounded-full bg-indigo-100 flex items-center justify-center"><svg className="w-3.5 h-3.5 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg></div>
                  <h3 className="card-header text-base text-indigo-700">Auto-Research on Flagged Clauses</h3>
                  <span className="text-[10px] px-2 py-0.5 bg-indigo-50 text-indigo-600 rounded-full">Legal Research Agent</span>
                </div>
                {result.auto_research.map((ar,i)=>(<div key={i} className="bg-[#fafaf9] rounded-lg p-4 border border-[#e8e5e0] slide-in" style={{animationDelay:`${i*80}ms`}}>
                  <div className="flex items-center gap-2 mb-2"><RiskBadge level={ar.risk_level||"MEDIUM"}/><span className="text-sm font-medium text-[#333]">{ar.clause_type}</span></div>
                  <p className="text-xs text-[#555] leading-relaxed mb-2">{ar.research}</p>
                  {ar.applicable_laws?.length>0&&(<div className="flex flex-wrap gap-1 mb-2">{ar.applicable_laws.map((l,j)=>(<span key={j} className="text-[10px] px-2 py-0.5 bg-blue-50 text-blue-700 rounded">{l.law||l}</span>))}</div>)}
                  {ar.recommendation&&<p className="text-xs text-green-700 font-medium">→ {ar.recommendation}</p>}
                </div>))}
              </div>)}

              {/* Suggested Next Actions */}
              {result?.suggested_actions?.length>0&&(<div className="card p-6">
                <div className="flex items-center gap-2 mb-3">
                  <div className="w-6 h-6 rounded-full bg-amber-100 flex items-center justify-center"><svg className="w-3.5 h-3.5 text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg></div>
                  <h3 className="card-header text-base text-[#1a1a1a]">Suggested Next Steps</h3>
                </div>
                <div className="space-y-2">
                  {result.suggested_actions.map((sa,i)=>(<div key={i} className="flex items-start gap-3 p-3 rounded-lg border border-[#e8e5e0] hover:bg-[#fafaf9] transition">
                    <span className={`shrink-0 mt-0.5 w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold text-white ${sa.priority==='high'?'bg-red-500':sa.priority==='medium'?'bg-amber-500':'bg-[#999]'}`}>{i+1}</span>
                    <div className="flex-1">
                      <div className="flex items-center gap-2"><span className="text-sm font-medium text-[#333]">{sa.action.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase())}</span>
                        <span className={`text-[10px] px-1.5 py-0.5 rounded ${sa.priority==='high'?'bg-red-100 text-red-700':sa.priority==='medium'?'bg-amber-100 text-amber-700':'bg-gray-100 text-[#666]'}`}>{sa.priority}</span></div>
                      <p className="text-xs text-[#666] mt-0.5">{sa.reason}</p>
                    </div>
                  </div>))}
                </div>
              </div>)}

              {/* Agents Used */}
              {result?.agents_used?.length>1&&(<div className="card p-4">
                <div className="flex items-center gap-2 text-[11px] text-[#999]">
                  <span>Agents used:</span>
                  {result.agents_used.map((a,i)=>(<span key={i} className="px-2 py-0.5 bg-[#f5f3f0] rounded text-[#666] font-medium">{a.replace(/_/g,' ')}</span>))}
                </div>
              </div>)}
            </div>)}

            {/* ── Drafting Results ── */}
            {dr&&!result?.error&&(<div className="space-y-4 fade-in">
              <div className="card p-6">
                <div className="flex items-center justify-between mb-3">
                  <div><h2 className="card-header text-xl">{dr.contract_title||"Generated Contract"}</h2>
                    <p className="text-xs text-[#999] mt-1">Template: {dr.template_used||"custom"}</p></div>
                  <button onClick={()=>{navigator.clipboard.writeText(dr.contract_text||"")}} className="btn-outline px-3 py-1 rounded text-xs transition">Copy</button>
                </div>
                <pre className="whitespace-pre-wrap text-[13px] text-[#333] bg-[#fafaf9] rounded-lg p-5 max-h-[600px] overflow-auto font-mono leading-relaxed border border-[#e8e5e0]">{dr.contract_text}</pre>
              </div>
              {dr.jurisdiction_notes&&(<div className="card p-5"><h3 className="text-xs font-semibold text-blue-600 mb-1">Jurisdiction</h3><p className="text-xs text-[#666]">{dr.jurisdiction_notes}</p></div>)}
              {dr.custom_clauses_added?.length>0&&(<div className="card p-5"><h3 className="text-xs font-semibold text-indigo-600 mb-1">Custom Clauses</h3>{dr.custom_clauses_added.map((c,i)=><p key={i} className="text-xs text-[#666]">&bull; {c}</p>)}</div>)}
              {qa&&(<div className="card border-green-200 p-6">
                <div className="flex items-center gap-3 mb-2"><h3 className="card-header text-base text-green-700">QA Review</h3><ScoreRing score={qa.overall_risk_score||0} size={50}/></div>
                <p className="text-xs text-[#666]">{qa.executive_summary}</p>
              </div>)}

              {/* Partner Approval Status */}
              {result?.approval&&(<div className={`card p-5 border-l-4 ${result.approval.status==='approved'?'border-l-green-500':'border-l-amber-500'}`}>
                <div className="flex items-center gap-3 mb-2">
                  <span className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium ${result.approval.status==='pending'?'bg-amber-100 text-amber-800':'bg-green-100 text-green-800'}`}>
                    <span className={`w-2 h-2 rounded-full ${result.approval.status==='pending'?'bg-amber-500 animate-pulse':'bg-green-500'}`}/>
                    {result.approval.status==='pending'?'Awaiting Partner Approval':'Approved'}
                  </span>
                  <span className="text-[11px] text-[#999]">ID: {result.approval.approval_id}</span>
                </div>
                <p className="text-sm text-[#555]">{result.approval.message}</p>
                {result.approval.slack_sent&&<p className="text-[11px] text-green-600 mt-1">Slack notification sent to partner channel</p>}
                {result.approval.slack_error&&<p className="text-[11px] text-red-500 mt-1">Slack error: {result.approval.slack_error}</p>}
                {!result.approval.slack_sent&&!result.approval.slack_error&&<p className="text-[11px] text-amber-600 mt-1">Slack not configured — approve via dashboard or API</p>}

                {result.approval.status==='pending'&&(<div className="flex gap-2 mt-3">
                  <button onClick={async()=>{try{const r=await fetch(`${API}/api/approvals/${result.approval.approval_id}/approve`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({note:'Approved via dashboard'})});const d=await r.json();if(d.status==='approved'){setResult(p=>({...p,approval:{...p.approval,status:'approved'},status:'approved'}))}}catch(e){console.error(e)}}}
                    className="px-4 py-2 bg-green-700 text-white rounded-lg text-xs font-medium hover:bg-green-800 transition">Approve & Send to Client</button>
                  <button onClick={async()=>{try{const r=await fetch(`${API}/api/approvals/${result.approval.approval_id}/reject`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({note:'Rejected via dashboard'})});const d=await r.json();if(d.status==='rejected'){setResult(p=>({...p,approval:{...p.approval,status:'rejected'},status:'rejected'}))}}catch(e){console.error(e)}}}
                    className="px-4 py-2 bg-white text-red-600 rounded-lg text-xs font-medium border border-red-200 hover:bg-red-50 transition">Reject</button>
                </div>)}
              </div>)}
            </div>)}

            {/* ── Research Results ── */}
            {rs&&!result?.error&&(<div className="space-y-4 fade-in">
              <div className="card p-6">
                <h2 className="card-header text-xl mb-2">Research Analysis</h2>
                <div className="flex gap-2 mb-3"><RiskBadge level={rs.confidence_level||"MEDIUM"}/><span className="text-xs text-[#999]">{rs.jurisdiction}</span>
                  {rs.rag_sources_used>0&&<span className="text-xs text-indigo-600">{rs.rag_sources_used} RAG sources</span>}</div>
                <p className="text-sm text-[#444] leading-relaxed whitespace-pre-wrap">{rs.legal_analysis}</p>
              </div>
              {rs.applicable_laws?.length>0&&(<div className="card p-6">
                <h3 className="card-header text-base text-blue-700 mb-2">Applicable Laws</h3>
                {rs.applicable_laws.map((l,i)=>(<div key={i} className="mb-2 bg-[#fafaf9] rounded p-2.5 border border-[#e8e5e0]">
                  <span className="text-sm font-medium text-[#333]">{l.law}</span>{l.section&&<span className="text-xs text-[#999] ml-2">{l.section}</span>}
                  <p className="text-xs text-[#666] mt-0.5">{l.relevance}</p></div>))}
              </div>)}
              {rs.key_findings?.length>0&&(<div className="card p-6">
                <h3 className="card-header text-base text-green-700 mb-2">Key Findings</h3>
                {rs.key_findings.map((f,i)=><p key={i} className="text-xs text-[#555] mb-1">&bull; {f}</p>)}
              </div>)}
              {rs.recommendations?.length>0&&(<div className="card p-6">
                <h3 className="card-header text-base text-indigo-700 mb-2">Recommendations</h3>
                {rs.recommendations.map((r,i)=><p key={i} className="text-xs text-[#555] mb-1">{i+1}. {r}</p>)}
              </div>)}
              {rs.disclaimer&&<p className="text-[11px] text-[#bbb] italic px-1">{rs.disclaimer}</p>}
            </div>)}

            {/* Audit Trail */}
            {result?.audit_trail?.length>0&&(<div className="card p-6"><AuditTrail trail={result.audit_trail}/></div>)}
            {result?.id&&(<div className="card p-3 flex justify-between text-[11px] text-[#999]">
              <span>Matter <code className="text-[#666] font-medium">{result.id}</code></span><span className="text-green-600">{result.status}</span></div>)}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ───────────── APP ROOT ───────────── */
function App(){
  const[page,setPage]=useState("landing");
  if(page==="landing")return <LandingPage onEnter={()=>setPage("dashboard")}/>;
  return <Dashboard onBack={()=>setPage("landing")}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
